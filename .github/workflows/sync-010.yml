name: Sync 法律 010 from Google Sheet

on:
  # 排程目標台灣凌晨 02:23 (UTC 18:23)；GH Actions 排程常延遲 1-4 小時，
  # 實際落在台灣 03:00-06:00 — 重點是避開同仁白天編輯總表的時段
  # （2026-06-10 同步撞上編輯中的 sheet 洗掉資料，詳見 sync_010.py guarded_clean_reload）
  schedule:
    - cron: '23 18 * * *'
  # 也允許手動 / Edge Function 觸發
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-010
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth httplib2 google-auth-httplib2

      - name: Run sync_010
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          python sync_010.py --year-from 2021 --year-to 2030 --reconcile-year 2026 --reconcile-month $(date -u -d '+8 hours' +%-m)
