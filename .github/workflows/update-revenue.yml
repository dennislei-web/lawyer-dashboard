name: 每日更新營收對帳

on:
  # 每天台灣時間中午 12 點和深夜 12 點自動執行（近 3 個月 hot window）
  schedule:
    - cron: '0 4 * * *'    # 台灣中午 12:00 (UTC 04:00)
    - cron: '0 16 * * *'   # 台灣深夜 00:00 (UTC 16:00)
    - cron: '0 20 8 * *'   # 每月 8 號台灣 04:00 月結定版：深掃近 6 個月，鎖定落出 hot window 前的補登/修正
  # 手動觸發
  workflow_dispatch:
    inputs:
      month:
        description: '指定月份 (例: 2026-03)，留空則更新本月'
        required: false
      months:
        description: '最近 N 個月 (例: 3)，留空則只更新本月'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install -r scripts/requirements.txt

      - name: 計算 ARGS
        id: args
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "ARGS=--month ${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.months }}" ]; then
            echo "ARGS=--months ${{ github.event.inputs.months }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 20 8 * *" ]; then
            echo "ARGS=--months 6" >> $GITHUB_OUTPUT   # 每月深掃定版
          else
            echo "ARGS=--months 3" >> $GITHUB_OUTPUT   # 每日 hot window
          fi

      - name: 爬取 CRM 對帳資訊 → revenue_records
        run: python scripts/scrape_reconciliation.py ${{ steps.args.outputs.ARGS }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRM_USERNAME: ${{ secrets.CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}

      - name: 爬取 CRM 法顧對帳資訊 → advisor_transactions
        run: python scripts/scrape_advisor_transactions.py ${{ steps.args.outputs.ARGS }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRM_USERNAME: ${{ secrets.CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}

      - name: 法顧委後案件保險網 → advisor_service_cases
        # CRM 新法顧儲值客戶自動建案 + 既有案件空欄位回填（只填 NULL，不蓋使用者編輯）
        run: python scripts/sync_advisor_service_cases.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
