name: 每日更新營收對帳

on:
  # 每天台灣時間中午 12 點和深夜 12 點自動執行
  schedule:
    - cron: '0 4 * * *'   # 台灣中午 12:00 (UTC 04:00)
    - cron: '0 16 * * *'  # 台灣深夜 00:00 (UTC 16:00)
  # 手動觸發
  workflow_dispatch:
    inputs:
      month:
        description: '指定月份 (例: 2026-03)，留空則更新本月'
        required: false
      months:
        description: '最近 N 個月 (例: 3)，留空則只更新本月'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install -r scripts/requirements.txt

      - name: 爬取 CRM 對帳 + 更新 Supabase
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="--month ${{ github.event.inputs.month }}"
          elif [ -n "${{ github.event.inputs.months }}" ]; then
            ARGS="--months ${{ github.event.inputs.months }}"
          fi
          python scripts/scrape_reconciliation.py $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRM_USERNAME: ${{ secrets.CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}
