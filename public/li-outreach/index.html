<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>里長開發追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --border:#2c313c;
    --text:#e6e8ec; --muted:#8b93a1; --accent:#4f8ef7; --good:#3fb56b;
    --warn:#e0954a; --bad:#e05a5a; --tierA:#3fb56b; --tierB:#e0954a; --tierC:#8b93a1;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 60px}
  h1{font-size:1.25rem;margin:0}
  .sub{color:var(--muted);font-size:.82rem;margin-top:4px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  /* login */
  #login{min-height:80vh;display:flex;align-items:center;justify-content:center}
  .loginCard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px;width:340px;max-width:92vw}
  .loginCard h2{margin:0 0 6px;font-size:1.1rem}
  input{width:100%;padding:11px 12px;margin-top:10px;background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.95rem}
  button{cursor:pointer;border:none;border-radius:9px;font-size:.92rem;font-weight:600}
  .btn{width:100%;padding:11px;margin-top:12px;background:var(--accent);color:#fff}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:12px;font-size:.84rem;padding:9px 11px;border-radius:8px;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(63,181,107,.12);color:var(--good)}
  .msg.err{background:rgba(224,90,90,.12);color:var(--bad)}
  /* dashboard */
  #dash{display:none}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:18px 0}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
  .kpi .v{font-size:1.5rem;font-weight:700}
  .kpi .l{color:var(--muted);font-size:.78rem;margin-top:2px}
  .kpi .c{font-size:.72rem;margin-top:5px}
  .conv{color:var(--accent)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
  .card h3{margin:0 0 12px;font-size:.98rem}
  .card h3 .hint{color:var(--muted);font-weight:400;font-size:.78rem;margin-left:8px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:.78rem}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .bar{height:7px;border-radius:4px;background:var(--accent);display:inline-block;vertical-align:middle}
  .pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:.74rem;font-weight:600}
  .pA{background:rgba(63,181,107,.16);color:var(--tierA)}
  .pB{background:rgba(224,149,74,.16);color:var(--tierB)}
  .pC{background:rgba(139,147,161,.16);color:var(--tierC)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .topbar{padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 12px}
  .muted{color:var(--muted)}
  .scroll{max-height:360px;overflow:auto}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:16px 0 2px}
  .filters select,.filters input{width:auto;margin:0;padding:8px 10px;font-size:.85rem}
  .filters input[type=search]{min-width:170px}
  .filters .ghost{padding:8px 12px}
  #fCount{font-size:.8rem;margin-left:auto}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN -->
  <div id="login">
    <div class="loginCard">
      <h2>里長開發追蹤</h2>
      <div class="sub">輸入公司 email，我們寄一條登入連結給你（免密碼）。</div>
      <form id="loginForm">
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        <button class="btn" id="loginBtn" type="submit">寄送登入連結</button>
      </form>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="row topbar">
      <div>
        <h1>里長開發追蹤</h1>
        <div class="sub" id="meta"></div>
      </div>
      <div class="row" style="gap:8px">
        <span class="muted" id="who"></span>
        <button class="ghost" id="logout">登出</button>
      </div>
    </div>

    <div class="filters" id="filters">
      <select id="fOwner"><option value="">全部負責人</option></select>
      <select id="fTier"><option value="">全部分級</option><option value="A">A 級</option><option value="B">B 級</option><option value="C">C 級</option></select>
      <select id="fStage">
        <option value="">全部階段</option>
        <option value="visited">有拜訪/接觸</option>
        <option value="talked">完成洽談</option>
        <option value="adopted">採用</option>
        <option value="gap">採用未放文宣</option>
        <option value="notvisited">尚未拜訪</option>
      </select>
      <select id="fMonth"><option value="">全部拜訪月份</option></select>
      <input id="fSearch" type="search" placeholder="搜尋 里 / 里長…">
      <button class="ghost" id="fReset">清除</button>
      <span class="muted" id="fCount"></span>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="card" id="weeklyCard" style="display:none">
      <h3 style="margin-bottom:12px">本週進度 <span class="hint" id="weeklyRef"></span></h3>
      <div class="kpis" id="weeklyKpis" style="margin:0"></div>
    </div>

    <div class="card" id="oaCard">
      <div class="row" style="align-items:flex-start">
        <div>
          <h3 style="margin-bottom:6px">里民 LINE 好友 <span class="hint">campaign 最終產出：里民加入「法律010🌸里民專屬法律諮詢」</span></h3>
          <div><span id="oaNow" style="font-size:1.8rem;font-weight:700"></span> <span id="oaDelta" style="font-size:.85rem"></span></div>
          <div class="muted" id="oaUpdated" style="font-size:.78rem;margin-top:3px"></div>
        </div>
      </div>
      <div style="height:200px;margin-top:14px"><canvas id="oaChart"></canvas></div>
      <div class="muted" id="oaSparkCap" style="font-size:.72rem;margin-top:6px"></div>
    </div>

    <div class="card">
      <h3>負責人進度 <span class="hint">每位同仁的漏斗（里長數 → 拜訪 → 完成洽談 → 採用 → 放文宣）</span><span class="hint" id="ownerWkNote"></span></h3>
      <div style="overflow:auto"><table id="ownerTable"></table></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>維繫分級分佈 <span class="hint">A/B/C</span></h3>
        <table id="tierTable"></table>
      </div>
      <div class="card">
        <h3>採用後落地缺口 <span class="hint">里長已答應採用、但文宣還沒放</span></h3>
        <div class="muted" id="gapSummary" style="margin-bottom:10px"></div>
      </div>
    </div>

    <div class="card">
      <h3>待辦清單：採用未放文宣 <span class="hint" id="wl1count"></span></h3>
      <div class="scroll"><table id="worklist1"></table></div>
    </div>

    <div class="card">
      <h3>待辦清單：已列名單尚未拜訪 <span class="hint" id="wl2count"></span></h3>
      <div class="scroll"><table id="worklist2"></table></div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://zpbkeyhxyykbvownrngf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NvTWZM6IGgc_Jn8iCXFvaA_QnvJsstM';
var sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

var $ = function(id){ return document.getElementById(id); };
function showLogin(){ $('login').style.display='flex'; $('dash').style.display='none'; }
function showDash(){ $('login').style.display='none'; $('dash').style.display='block'; }
function setMsg(el, text, kind){ el.className='msg show '+kind; el.textContent=text; }

// ── AUTH (magic link) ──
$('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var btn=$('loginBtn'), m=$('loginMsg');
  btn.disabled=true; btn.textContent='寄送中…';
  try{
    var r = await sb.auth.signInWithOtp({
      email: $('email').value.trim(),
      options: { emailRedirectTo: window.location.href.split('#')[0] }
    });
    if(r.error) throw r.error;
    setMsg(m,'登入連結已寄出，請到信箱點開連結（同一個瀏覽器）。','ok');
  }catch(ex){ setMsg(m,'寄送失敗：'+(ex.message||ex),'err'); }
  finally{ btn.disabled=false; btn.textContent='寄送登入連結'; }
});
$('logout').addEventListener('click', async function(){ await sb.auth.signOut(); location.reload(); });

async function checkAccess(){
  // RLS：bd_li_access 只回傳自己那列；查得到 = 在白名單
  var r = await sb.from('bd_li_access').select('email,name').limit(1);
  if(r.error || !r.data || !r.data.length) return null;
  return r.data[0];
}

async function init(){
  if(!sb){ setMsg($('loginMsg'),'初始化失敗','err'); return; }
  var s = await sb.auth.getSession();
  if(!s.data.session){ showLogin(); return; }
  var me = await checkAccess();
  if(!me){
    showLogin();
    setMsg($('loginMsg'),'此帳號（'+s.data.session.user.email+'）尚未開通存取權，請聯絡管理者。','err');
    await sb.auth.signOut();
    return;
  }
  $('who').textContent = me.name || me.email;
  showDash();
  await loadData();
}
sb && sb.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_IN') init(); });

// ── DATA + RENDER ──
function pct(a,b){ return b ? Math.round(a/b*100) : 0; }

var ALL = [];

// 從拜訪日(M/D 假設 2026，或完整日期)推月份；抓不到回 ''
function visitMonth(x){
  var cands = [x.visit2_date, x.visit1_date];
  for(var i=0;i<cands.length;i++){
    var v = (cands[i]||'').trim(); if(!v) continue;
    var m = v.match(/^(\d{4})[-\/](\d{1,2})[-\/]\d{1,2}/);
    if(m) return m[1]+'-'+('0'+m[2]).slice(-2);
    m = v.match(/^(\d{1,2})\/(\d{1,2})/);
    if(m) return '2026-'+('0'+m[1]).slice(-2);
  }
  return '';
}

async function loadData(){
  var r = await sb.from('bd_li_outreach').select('*').limit(5000);
  if(r.error){ $('meta').textContent='讀取失敗：'+r.error.message; return; }
  ALL = r.data || [];
  var synced = ALL.length ? ALL[0].synced_at : null;
  $('meta').textContent = ALL.length+' 筆里長紀錄 · 最後同步 '+(synced? new Date(synced).toLocaleString('zh-TW') : '—')+' · 每天 09:00 自動更新';
  buildFilterOptions();
  render();
  loadFollowers();
  loadWeekly();
}

// ── 本週進度（每日由 sync_li_outreach.py 寫入 bd_li_outreach_snapshots，每位負責人一列）──
var WEEKLY_OWNER = null;   // {owner:{n,v,t,a,f}} 本週增量
var WEEKLY_REF = null;     // {last, ref, sameDay}
async function loadWeekly(){
  var r = await sb.from('bd_li_outreach_snapshots').select('*').order('snapshot_date',{ascending:true}).limit(4000);
  if(r.error){ $('weeklyCard').style.display='none'; return; }
  var rows = r.data || [];
  // 依日期加總成全所歷史
  var byDate = {};
  rows.forEach(function(s){
    var d = byDate[s.snapshot_date] || (byDate[s.snapshot_date]={snapshot_date:s.snapshot_date,total:0,visited:0,talked:0,adopted:0,flyer:0});
    d.total+=s.total||0; d.visited+=s.visited||0; d.talked+=s.talked||0; d.adopted+=s.adopted||0; d.flyer+=s.flyer||0;
  });
  var firmHist = Object.keys(byDate).sort().map(function(k){ return byDate[k]; });
  renderWeekly(firmHist);
  buildWeeklyOwner(rows, firmHist);
  renderOwners(applyFilters());  // 補上每人本週增量
}
// 算各負責人「最新日 vs 參考日」的增量
function buildWeeklyOwner(rows, firmHist){
  WEEKLY_OWNER = null; WEEKLY_REF = null;
  if(!firmHist.length) return;
  var last = firmHist[firmHist.length-1], ref = weeklyRef(firmHist);
  WEEKLY_REF = { last:last.snapshot_date, ref:ref.snapshot_date, sameDay: ref.snapshot_date===last.snapshot_date };
  var at = {};  // date -> owner -> row
  rows.forEach(function(s){ (at[s.snapshot_date] = at[s.snapshot_date]||{})[s.owner]=s; });
  var L = at[last.snapshot_date]||{}, R = at[ref.snapshot_date]||{};
  var owners = {};
  Object.keys(L).forEach(function(o){owners[o]=1;});
  Object.keys(R).forEach(function(o){owners[o]=1;});
  WEEKLY_OWNER = {};
  Object.keys(owners).forEach(function(o){
    var a=L[o]||{}, b=R[o]||{};
    WEEKLY_OWNER[o] = {
      n:(a.total||0)-(b.total||0), v:(a.visited||0)-(b.visited||0),
      t:(a.talked||0)-(b.talked||0), a:(a.adopted||0)-(b.adopted||0), f:(a.flyer||0)-(b.flyer||0)
    };
  });
}
// 本週增量小字（只顯示非零；資料未滿一週不顯示）
function wd(d){
  if(d==null || (WEEKLY_REF && WEEKLY_REF.sameDay)) return '';
  if(d>0) return ' <span style="color:var(--good);font-size:.72rem">+'+d+'</span>';
  if(d<0) return ' <span style="color:var(--bad);font-size:.72rem">'+d+'</span>';
  return '';
}
// 參考點：取「不晚於最新日 -7 天」的最新一筆；還沒滿一週就用最早一筆
function weeklyRef(hist){
  var last = hist[hist.length-1];
  var cutoff = new Date(last.snapshot_date+'T00:00:00'); cutoff.setDate(cutoff.getDate()-7);
  var ref = null;
  for(var i=0;i<hist.length-1;i++){
    if(new Date(hist[i].snapshot_date+'T00:00:00') <= cutoff) ref = hist[i];
  }
  return ref || hist[0];
}
function renderWeekly(hist){
  if(!hist.length){ $('weeklyCard').style.display='none'; return; }
  $('weeklyCard').style.display='block';
  var last = hist[hist.length-1], ref = weeklyRef(hist);
  var sameDay = ref.snapshot_date === last.snapshot_date;
  $('weeklyRef').textContent = sameDay
    ? '每天記一筆，約一週後顯示週增量（目前資料累積中）'
    : '對比 '+ref.snapshot_date+' → '+last.snapshot_date;
  var items = [['total','里長總數'],['visited','有拜訪'],['talked','完成洽談'],['adopted','採用'],['flyer','放文宣']];
  $('weeklyKpis').innerHTML = items.map(function(it){
    var k=it[0], d=(last[k]||0)-(ref[k]||0);
    var col = d>0?'var(--good)':(d<0?'var(--bad)':'var(--muted)');
    var txt = sameDay ? '—' : (d>0?'▲ +'+d : (d<0?'▼ '+Math.abs(d) : '+0'));
    return '<div class="kpi"><div class="v" style="color:'+col+'">'+txt+'</div>'+
           '<div class="l">'+it[1]+'</div>'+
           '<div class="c muted">目前 '+(last[k]||0)+'</div></div>';
  }).join('');
}

// ── 里民 LINE 好友數(每日由 LINE API 自動寫入 bd_li_oa_followers) ──
async function loadFollowers(){
  var r = await sb.from('bd_li_oa_followers').select('*').order('date',{ascending:true}).limit(400);
  if(r.error){ $('oaCard').style.display='none'; return; }
  renderFollowers(r.data || []);
}
function renderFollowers(hist){
  if(!hist.length){ $('oaNow').textContent='—'; $('oaUpdated').textContent='尚無資料，填入今天的好友數開始追蹤'; return; }
  var last=hist[hist.length-1], prev=hist.length>1?hist[hist.length-2]:null;
  $('oaNow').textContent = Number(last.followers).toLocaleString();
  if(prev){ var d=last.followers-prev.followers;
    $('oaDelta').innerHTML = (d>=0?'<span style="color:var(--good)">▲ +'+d:'<span style="color:var(--bad)">▼ '+d)+'</span> <span class="muted">vs '+prev.date.slice(5)+'</span>'; }
  else $('oaDelta').textContent='';
  $('oaUpdated').textContent = '最後更新 '+last.date+(last.source==='line_api'?'（自動）':'（手動）');
  $('oaSparkCap').textContent = hist.length+' 個資料點 · '+hist[0].date+' → '+last.date +
    (hist.length<2 ? '（每天 09:00 自動新增一點，曲線會逐漸長出來）' : '');
  renderFollowersChart(hist);
}

var oaChart = null;
function renderFollowersChart(hist){
  var ctx = document.getElementById('oaChart');
  if(!ctx || !window.Chart) return;
  var labels = hist.map(function(h){ return h.date; });
  var data   = hist.map(function(h){ return h.followers; });
  var ds = {
    label:'好友數', data:data,
    borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,.14)',
    fill:true, tension:0.3, pointRadius:hist.length<=1?5:3, pointBackgroundColor:'#4f8ef7', borderWidth:2
  };
  if(oaChart){ oaChart.data.labels=labels; oaChart.data.datasets[0].data=data; oaChart.update(); return; }
  oaChart = new Chart(ctx, {
    type:'line',
    data:{ labels:labels, datasets:[ds] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ title:function(it){return it[0].label;}, label:function(it){return '好友 '+it.parsed.y;} } } },
      scales:{
        x:{ ticks:{color:'#8b93a1',maxTicksLimit:8,maxRotation:0}, grid:{color:'rgba(255,255,255,.05)'} },
        y:{ ticks:{color:'#8b93a1',precision:0}, grid:{color:'rgba(255,255,255,.06)'}, beginAtZero:false }
      }
    }
  });
}

function buildFilterOptions(){
  var owners={}, months={};
  ALL.forEach(function(x){
    if(x.owner) owners[x.owner]=(owners[x.owner]||0)+1;
    var mo=visitMonth(x); if(mo) months[mo]=(months[mo]||0)+1;
  });
  $('fOwner').innerHTML = '<option value="">全部負責人</option>' +
    Object.keys(owners).sort().map(function(o){ return '<option value="'+esc(o)+'">'+esc(o)+'（'+owners[o]+'）</option>'; }).join('');
  $('fMonth').innerHTML = '<option value="">全部拜訪月份</option>' +
    Object.keys(months).sort().map(function(m){ return '<option value="'+m+'">'+m+'（'+months[m]+'）</option>'; }).join('') +
    '<option value="__none">無明確日期</option>';
}

function applyFilters(){
  var o=$('fOwner').value, t=$('fTier').value, st=$('fStage').value, mo=$('fMonth').value,
      q=$('fSearch').value.trim().toLowerCase();
  return ALL.filter(function(x){
    if(o && x.owner!==o) return false;
    if(t && (x.tier||'').toUpperCase()!==t) return false;
    if(st==='visited'    && !x.visit1_date) return false;
    if(st==='talked'     && !x.talked) return false;
    if(st==='adopted'    && !x.adopted) return false;
    if(st==='gap'        && !(x.adopted && !x.flyer_placed)) return false;
    if(st==='notvisited' && (x.visit1_date || x.talked)) return false;
    if(mo){ var vm=visitMonth(x); if(mo==='__none'){ if(vm) return false; } else if(vm!==mo) return false; }
    if(q){ var hay=((x.region||'')+(x.chief||'')+(x.owner||'')).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
}

function render(){
  var rows = applyFilters();
  $('fCount').textContent = '顯示 '+rows.length+' / '+ALL.length+' 筆';
  var tot=rows.length;
  var visited = rows.filter(function(x){ return x.visit1_date; }).length;
  var talked  = rows.filter(function(x){ return x.talked; }).length;
  var adopted = rows.filter(function(x){ return x.adopted; }).length;
  var flyer   = rows.filter(function(x){ return x.flyer_placed; }).length;
  $('kpis').innerHTML = [
    kpi(tot,'里長總數',''),
    kpi(visited,'有拜訪', pct(visited,tot)+'% of 名單'),
    kpi(talked,'完成洽談', pct(talked,visited)+'% of 拜訪'),
    kpi(adopted,'採用', pct(adopted,talked)+'% of 洽談'),
    kpi(flyer,'放文宣', pct(flyer,adopted)+'% of 採用')
  ].join('');
  renderOwners(rows);
  renderTiers(rows);
  renderGap(rows, adopted, flyer);
  renderWorklist1(rows);
  renderWorklist2(rows);
}

['fOwner','fTier','fStage','fMonth'].forEach(function(id){ $(id).addEventListener('change', render); });
$('fSearch').addEventListener('input', render);
$('fReset').addEventListener('click', function(){
  ['fOwner','fTier','fStage','fMonth'].forEach(function(id){ $(id).value=''; });
  $('fSearch').value=''; render();
});

function kpi(v,l,c){
  return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div>'+
         (c? '<div class="c conv">'+c+'</div>':'')+'</div>';
}

function renderOwners(rows){
  var by = {};
  rows.forEach(function(x){
    var o = x.owner||'—';
    by[o] = by[o] || {n:0,v:0,t:0,a:0,f:0};
    by[o].n++;
    if(x.visit1_date) by[o].v++;
    if(x.talked) by[o].t++;
    if(x.adopted) by[o].a++;
    if(x.flyer_placed) by[o].f++;
  });
  var arr = Object.keys(by).map(function(k){ return Object.assign({owner:k}, by[k]); })
                  .sort(function(a,b){ return b.a-a.a; });
  var maxN = Math.max.apply(null, arr.map(function(x){return x.n;}).concat([1]));
  var note = $('ownerWkNote');
  if(note) note.textContent = (WEEKLY_REF && !WEEKLY_REF.sameDay)
    ? '· 綠色小字＝本週增量（vs '+WEEKLY_REF.ref+'）' : '';
  var head = '<tr><th>負責人</th><th class="num">里長數</th><th class="num">有拜訪</th>'+
             '<th class="num">完成洽談</th><th class="num">採用</th><th class="num">放文宣</th><th>規模</th></tr>';
  var body = arr.map(function(x){
    var wk = (WEEKLY_OWNER && WEEKLY_OWNER[x.owner]) || {};
    return '<tr><td><b>'+x.owner+'</b></td>'+
      '<td class="num">'+x.n+wd(wk.n)+'</td><td class="num">'+x.v+wd(wk.v)+'</td>'+
      '<td class="num">'+x.t+wd(wk.t)+'</td><td class="num">'+x.a+wd(wk.a)+'</td>'+
      '<td class="num">'+x.f+wd(wk.f)+'</td>'+
      '<td><span class="bar" style="width:'+Math.round(x.n/maxN*120)+'px"></span></td></tr>';
  }).join('');
  $('ownerTable').innerHTML = head+body;
}

function renderTiers(rows){
  var t = {A:0,B:0,C:0};
  rows.forEach(function(x){ var v=(x.tier||'').toUpperCase(); if(t[v]!==undefined) t[v]++; });
  var total=t.A+t.B+t.C||1;
  function line(k,cls){ return '<tr><td><span class="pill '+cls+'">'+k+'</span></td>'+
    '<td class="num">'+t[k]+'</td><td class="num muted">'+pct(t[k],total)+'%</td></tr>'; }
  $('tierTable').innerHTML = '<tr><th>分級</th><th class="num">數量</th><th class="num">佔比</th></tr>'+
    line('A','pA')+line('B','pB')+line('C','pC');
}

function renderGap(rows, adopted, flyer){
  var gap = adopted - flyer;
  $('gapSummary').innerHTML = '採用 <b style="color:var(--text)">'+adopted+'</b> · 已放文宣 <b style="color:var(--good)">'+flyer+
    '</b> · <span style="color:var(--warn)">缺口 '+gap+' 個里長</span><br>'+
    '<span style="font-size:.82rem">這是 campaign 真正的產出瓶頸：里長都答應了，文宣還沒落地。</span>';
}

function renderWorklist1(rows){
  var list = rows.filter(function(x){ return x.adopted && !x.flyer_placed; })
                 .sort(function(a,b){ return (a.owner||'').localeCompare(b.owner||''); });
  $('wl1count').textContent = list.length+' 個';
  var head='<tr><th>負責人</th><th>里</th><th>里長</th><th>分級</th><th>備註</th></tr>';
  $('worklist1').innerHTML = head + (list.length? list.map(rowLine).join('') :
    '<tr><td colspan="5" class="muted">無</td></tr>');
}

function renderWorklist2(rows){
  var list = rows.filter(function(x){ return x.chief && !x.visit1_date && !x.talked; })
                 .sort(function(a,b){ return (a.owner||'').localeCompare(b.owner||''); });
  $('wl2count').textContent = list.length+' 個';
  var head='<tr><th>負責人</th><th>里</th><th>里長</th><th>預計聯繫</th><th>追蹤</th></tr>';
  $('worklist2').innerHTML = head + (list.length? list.map(function(x){
    return '<tr><td>'+esc(x.owner)+'</td><td>'+esc(x.region)+'</td><td>'+esc(x.chief)+'</td>'+
      '<td>'+esc(x.expected_contact)+'</td><td>'+esc(x.tracking)+'</td></tr>';
  }).join('') : '<tr><td colspan="5" class="muted">無</td></tr>');
}

function rowLine(x){
  var t=(x.tier||'').toUpperCase();
  var pill = t==='A'?'<span class="pill pA">A</span>':t==='B'?'<span class="pill pB">B</span>':t==='C'?'<span class="pill pC">C</span>':'';
  return '<tr><td>'+esc(x.owner)+'</td><td>'+esc(x.region)+'</td><td>'+esc(x.chief)+'</td>'+
    '<td>'+pill+'</td><td class="muted">'+esc(x.note||x.visit_result||'')+'</td></tr>';
}
function esc(s){ return s==null?'':String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

init();
</script>
</body>
</html>
