name: Sync 法律 010 from Google Sheet

on:
  # 每天台灣 09:00 (UTC 01:00) 自動同步
  schedule:
    - cron: '0 1 * * *'
  # 也允許手動 / Edge Function 觸發
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-010
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth httplib2 google-auth-httplib2

      - name: Run sync_010
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          python sync_010.py --year-from 2021 --year-to 2030 --reconcile-year 2026 --reconcile-month $(date -u -d '+8 hours' +%-m)
