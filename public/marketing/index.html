<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>雷律師 廣告/LINE 成效追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --border:#2c313c;
    --text:#e6e8ec; --muted:#8b93a1; --accent:#4f8ef7; --good:#3fb56b;
    --warn:#e0954a; --bad:#e05a5a; --line:#06c755;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 60px}
  h1{font-size:1.25rem;margin:0}
  .sub{color:var(--muted);font-size:.82rem;margin-top:4px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  #login{min-height:80vh;display:flex;align-items:center;justify-content:center}
  .loginCard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px;width:340px;max-width:92vw}
  .loginCard h2{margin:0 0 6px;font-size:1.1rem}
  input{width:100%;padding:11px 12px;margin-top:10px;background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.95rem}
  button{cursor:pointer;border:none;border-radius:9px;font-size:.92rem;font-weight:600}
  .btn{width:100%;padding:11px;margin-top:12px;background:var(--accent);color:#fff}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:12px;font-size:.84rem;padding:9px 11px;border-radius:8px;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(63,181,107,.12);color:var(--good)}
  .msg.err{background:rgba(224,90,90,.12);color:var(--bad)}
  #dash{display:none}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:6px 0 4px}
  .kpilabel{color:var(--muted);font-size:.78rem;font-weight:700;margin:16px 2px 8px;display:flex;align-items:center;gap:10px}
  .kpilabel:first-child{margin-top:6px}
  .kpilabel::after{content:"";flex:1;height:1px;background:var(--border)}
  .kpilabel b{color:var(--text);font-weight:700}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;border-left:3px solid var(--border)}
  .kpi.good{border-left-color:var(--good)} .kpi.warn{border-left-color:var(--warn)} .kpi.bad{border-left-color:var(--bad)}
  .kpi .v{font-size:1.6rem;font-weight:700}
  .kpi .l{color:var(--muted);font-size:.78rem;margin-top:2px}
  .kpi .c{font-size:.74rem;margin-top:6px}
  .up{color:var(--good)} .down{color:var(--bad)} .flat{color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
  .card h3{margin:0 0 4px;font-size:.98rem}
  .card .hint{color:var(--muted);font-weight:400;font-size:.78rem;margin-left:8px}
  .chartbox{position:relative;height:300px;margin-top:12px}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:.76rem}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .topbar{padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 12px}
  .muted{color:var(--muted)}
  .scroll{max-height:340px;overflow:auto}
  table.overview td{padding:9px 11px}
  table.overview tbody tr:hover{background:rgba(255,255,255,.03)}
  td.barcell{position:relative}
  td.barcell .bg{position:absolute;left:9px;bottom:3px;height:4px;border-radius:2px;opacity:.7}
  td.barcell .t{position:relative}
  .peak{font-size:.66rem;color:var(--good);margin-left:5px;vertical-align:middle}
  table.overview tr.sumrow td{border-top:2px solid var(--border);font-weight:700;background:rgba(255,255,255,.025)}
  .apptsum{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
  .apptsum .b{flex:1;min-width:150px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px}
  .apptsum .b .n{font-size:1.45rem;font-weight:700}
  .apptsum .b .k{color:var(--muted);font-size:.74rem;margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .note{background:rgba(224,149,74,.10);border:1px solid rgba(224,149,74,.3);border-radius:10px;padding:12px 14px;font-size:.85rem;color:#e8c79a;margin-bottom:16px;line-height:1.55}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN -->
  <div id="login">
    <div class="loginCard">
      <h2>雷律師 廣告/LINE 成效</h2>
      <div class="sub">輸入公司 email，我們寄一條登入連結給你（免密碼）。</div>
      <form id="loginForm">
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        <button class="btn" id="loginBtn" type="submit">寄送登入連結</button>
      </form>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="row topbar">
      <div>
        <h1>雷律師 廣告/LINE 成效追蹤</h1>
        <div class="sub" id="meta"></div>
      </div>
      <div class="row" style="gap:8px">
        <span class="muted" id="who"></span>
        <button class="ghost" id="logout">登出</button>
      </div>
    </div>

    <div class="kpilabel"><b>歷史累計</b>2025/08 起整段累積</div>
    <div class="kpis" id="kpisHist"></div>

    <div class="kpilabel"><b>本月最新</b><span id="curMonth"></span></div>
    <div class="kpis" id="kpis"></div>

    <div class="note" id="alertBox" style="display:none"></div>

    <div class="card">
      <h3>歷史總覽<span class="hint">每月一列 — 花費 → 名單 → CPL → 約訪，整條漏斗一眼看完（CPL 越低越好）</span></h3>
      <div class="scroll"><table class="overview" id="tOverview"></table></div>
    </div>

    <div class="card">
      <h3>廣告花費 vs 名單成本 (CPL)<span class="hint">每月 — 長條=總花費，折線=每名單成本，越低越好</span></h3>
      <div class="chartbox"><canvas id="cSpend"></canvas></div>
    </div>

    <div class="card">
      <h3>LINE@ 官方帳號成長<span class="hint">雙周 — 長條=當期新增人數，折線=累計總人數</span></h3>
      <div class="chartbox"><canvas id="cLine"></canvas></div>
    </div>

    <div class="card">
      <h3>實際約訪場次<span class="hint">每月 — 廣告→名單→真的約到的場次數，最終轉換</span></h3>
      <div class="apptsum" id="apptSummary"></div>
      <div class="chartbox"><canvas id="cAppt"></canvas></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>月成效明細</h3>
        <div class="scroll"><table id="tMonthly"></table></div>
      </div>
      <div class="card">
        <h3>雙周 LINE 明細</h3>
        <div class="scroll"><table id="tBiweekly"></table></div>
      </div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://zpbkeyhxyykbvownrngf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NvTWZM6IGgc_Jn8iCXFvaA_QnvJsstM';
var sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

var $ = function(id){ return document.getElementById(id); };
function showLogin(){ $('login').style.display='flex'; $('dash').style.display='none'; }
function showDash(){ $('login').style.display='none'; $('dash').style.display='block'; }
function setMsg(el, text, kind){ el.className='msg show '+kind; el.textContent=text; }
function nt(n){ return n==null?'—':'NT$'+Math.round(n).toLocaleString(); }
function num(n){ return n==null?'—':Math.round(n).toLocaleString(); }

// ── AUTH (magic link) ──
$('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var btn=$('loginBtn'), m=$('loginMsg');
  btn.disabled=true; btn.textContent='寄送中…';
  try{
    var r = await sb.auth.signInWithOtp({
      email: $('email').value.trim(),
      options: { emailRedirectTo: window.location.href.split('#')[0] }
    });
    if(r.error) throw r.error;
    setMsg(m,'登入連結已寄出，請到信箱點開連結（同一個瀏覽器）。','ok');
  }catch(ex){ setMsg(m,'寄送失敗：'+(ex.message||ex),'err'); }
  finally{ btn.disabled=false; btn.textContent='寄送登入連結'; }
});
$('logout').addEventListener('click', async function(){ await sb.auth.signOut(); location.reload(); });

async function checkAccess(){
  var r = await sb.from('mkt_access').select('email,name').limit(1);
  if(r.error || !r.data || !r.data.length) return null;
  return r.data[0];
}

async function init(){
  if(!sb){ setMsg($('loginMsg'),'初始化失敗','err'); return; }
  var s = await sb.auth.getSession();
  if(!s.data.session){ showLogin(); return; }
  var me = await checkAccess();
  if(!me){
    showLogin();
    setMsg($('loginMsg'),'此帳號（'+s.data.session.user.email+'）尚未開通存取權，請聯絡管理者。','err');
    await sb.auth.signOut();
    return;
  }
  $('who').textContent = me.name || me.email;
  showDash();
  await loadData();
}
sb && sb.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_IN') init(); });

// ── DATA + RENDER ──
var MON=[], BIW=[], APT=[];
async function loadData(){
  var [m,b,a] = await Promise.all([
    sb.from('mkt_monthly').select('*').order('month',{ascending:true}),
    sb.from('mkt_biweekly').select('*').order('period_end',{ascending:true}),
    sb.from('mkt_appointments').select('*').order('month',{ascending:true})
  ]);
  if(m.error){ $('meta').textContent='讀取失敗：'+m.error.message; return; }
  MON=m.data||[]; BIW=b.data||[]; APT=a.data||[];
  var synced = MON.length? MON[0].synced_at : null;
  $('meta').textContent = '資料來源：welly FB 投放報表 ｜ 最後同步 '+(synced? new Date(synced).toLocaleString('zh-TW'):'—')+' ｜ 每天 09:00 自動更新';
  renderKPIsHist(); renderKPIs(); renderAlert(); renderOverview(); renderTables();
  drawSpend(); drawLine(); drawAppt();
}

function delta(cur, prev, lowerBetter){
  if(cur==null||prev==null||prev===0) return '<span class="flat">—</span>';
  var d = cur-prev, pct = Math.round(d/prev*100);
  var improving = lowerBetter ? d<0 : d>0;
  var cls = d===0?'flat':(improving?'up':'down');
  var arrow = d>0?'▲':(d<0?'▼':'—');
  return '<span class="'+cls+'">'+arrow+' '+(d>0?'+':'')+pct+'%</span>';
}

function renderKPIsHist(){
  var totalSpend=0,totalLeads=0,months=0,sumAppt=0,spendApt=0;
  var aptMap={}; APT.forEach(function(r){ aptMap[r.month]=r.appointments; sumAppt+=r.appointments||0; });
  MON.forEach(function(r){
    var s=r.total_spend||r.lead_spend||0; totalSpend+=s; totalLeads+=r.leads||0; months++;
    if(aptMap[r.month.replace(/\//g,'-')]!=null) spendApt+=s;
  });
  var avgCpl = totalLeads? totalSpend/totalLeads : null;
  var lineTotal = BIW.length? BIW[BIW.length-1].line_total : null;
  var costAppt = sumAppt? spendApt/sumAppt : null;
  var span = MON.length? MON[0].month+'～'+MON[MON.length-1].month : '';
  var k=[
    {v:nt(avgCpl), l:'歷史平均 CPL（每名單成本）', c:'總花費 '+nt(totalSpend)+' ÷ 名單 '+num(totalLeads)},
    {v:num(totalLeads), l:'累計名單數 · '+span, c:'月均 '+num(months?Math.round(totalLeads/months):0)+' 名單 / '+months+' 個月'},
    {v:num(lineTotal), l:'LINE@ 累計人數', c:'目前官方帳號總人數'},
    {v:num(sumAppt)+' 場', l:'累計約成場次', c:'平均每場 '+nt(costAppt)}
  ];
  $('kpisHist').innerHTML = k.map(function(x){
    return '<div class="kpi"><div class="v">'+x.v+'</div><div class="l">'+x.l+'</div><div class="c flat">'+x.c+'</div></div>';
  }).join('');
}

function renderKPIs(){
  var lm = MON[MON.length-1]||{}, pm = MON[MON.length-2]||{};
  if($('curMonth')) $('curMonth').textContent = lm.month||'';
  var lb = BIW[BIW.length-1]||{}, pb = BIW[BIW.length-2]||{};
  var la = APT[APT.length-1]||{}, pa = APT[APT.length-2]||{};
  // CPL 狀態：跌=good
  var cplCls = (lm.cpl!=null&&pm.cpl!=null)?(lm.cpl<=pm.cpl?'good':'warn'):'';
  // LINE 新增狀態：< 50 視為熄火
  var addCls = lb.line_added==null?'':(lb.line_added>=80?'good':(lb.line_added>=40?'warn':'bad'));
  // 約訪狀態
  var aCls = (la.appointments!=null&&pa.appointments!=null)?(la.appointments>=pa.appointments?'good':'bad'):'';
  var k = [
    {cls:cplCls, v:nt(lm.cpl), l:'最新月 CPL（每名單成本）· '+(lm.month||''), c:delta(lm.cpl,pm.cpl,true)+' vs 上月'},
    {cls:'', v:num(lm.leads), l:'最新月 名單數', c:delta(lm.leads,pm.leads,false)+' vs 上月 · 花費 '+nt(lm.total_spend||lm.lead_spend)},
    {cls:addCls, v:num(lb.line_added), l:'最新雙周 LINE 新增 · '+(lb.period||''), c:'累計 '+num(lb.line_total)+' 人 · '+delta(lb.line_added,pb.line_added,false)},
    {cls:aCls, v:num(la.appointments)+' 場', l:'最新月 約訪場次 · '+(la.month||''), c:delta(la.appointments,pa.appointments,false)+' vs 上月'}
  ];
  $('kpis').innerHTML = k.map(function(x){
    return '<div class="kpi '+x.cls+'"><div class="v">'+x.v+'</div><div class="l">'+x.l+'</div><div class="c">'+x.c+'</div></div>';
  }).join('');
}

function renderAlert(){
  var msgs=[];
  var lb=BIW[BIW.length-1]||{}, lb2=BIW[BIW.length-2]||{};
  if(lb.line_added!=null && lb.line_added<40)
    msgs.push('🔴 <b>LINE@ 加入正在熄火</b>：最近一期（'+lb.period+'）只新增 '+lb.line_added+' 人，上一期 '+(lb2.line_added||'—')+' 人。累計卡在 '+num(lb.line_total)+'。LINE 全靠表單流量帶，邊際成本已飆高 — 要重新評估是否值得繼續導 LINE，或改善導入動線。');
  var la=APT[APT.length-1]||{}, peak=APT.reduce(function(p,c){return c.appointments>p.appointments?c:p;},{appointments:0});
  if(la.appointments!=null && peak.appointments && la.appointments < peak.appointments*0.5)
    msgs.push('🟡 <b>約訪場次滑落</b>：'+la.month+' 只有 '+la.appointments+' 場，高峰是 '+peak.month+' 的 '+peak.appointments+' 場。名單成本還在改善，但最終約訪轉換掉了一半以上 — 瓶頸可能在名單品質或追約環節。');
  if(msgs.length){ $('alertBox').style.display='block'; $('alertBox').innerHTML = msgs.join('<hr style="border:none;border-top:1px solid rgba(224,149,74,.25);margin:10px 0">'); }
}

function renderOverview(){
  var aptMap={}; APT.forEach(function(r){ aptMap[r.month]=r.appointments; });
  var maxSpend=0,maxLeads=0,maxApt=0;
  MON.forEach(function(r){ var s=r.total_spend||r.lead_spend||0; if(s>maxSpend)maxSpend=s; if((r.leads||0)>maxLeads)maxLeads=r.leads; });
  APT.forEach(function(r){ if((r.appointments||0)>maxApt)maxApt=r.appointments; });
  function bar(val,max,color){ var w=max&&val?Math.round(val/max*100):0; return '<span class="bg" style="width:calc('+w+'% - 18px);background:'+color+'"></span>'; }
  // 合計（約訪只算有資料的月份，每場成本才公平）
  var sumSpendAll=0,sumLeads=0,sumAppt=0,sumSpendApt=0,sumLeadsApt=0;
  MON.forEach(function(r){
    var spend=r.total_spend||r.lead_spend||0; sumSpendAll+=spend; sumLeads+=r.leads||0;
    var apt=aptMap[r.month.replace(/\//g,'-')];
    if(apt!=null){ sumAppt+=apt; sumSpendApt+=spend; sumLeadsApt+=r.leads||0; }
  });
  var head='<tr><th>月份</th><th class="num">總花費</th><th class="num">名單數</th><th class="num">CPL（每名單）</th><th class="num">約訪場次</th><th class="num">每場成本</th></tr>';
  var rows = MON.map(function(r,i){
    var prev = MON[i-1]||{};
    var spend = r.total_spend||r.lead_spend;
    var apt = aptMap[r.month.replace(/\//g,'-')];
    var cplCell = nt(r.cpl);
    if(r.cpl!=null && prev.cpl!=null && prev.cpl!==0){
      var d=r.cpl-prev.cpl, cls=d<0?'up':(d>0?'down':'flat'), ar=d<0?'▼':(d>0?'▲':'—');
      cplCell += ' <span class="'+cls+'" style="font-size:.72rem">'+ar+Math.abs(Math.round(d/prev.cpl*100))+'%</span>';
    }
    var aptCell, costCell;
    if(apt==null){ aptCell='<span class="muted">—</span>'; costCell='<span class="muted">—</span>'; }
    else{
      var ac = apt>=15?'var(--good)':(apt>=8?'var(--warn)':'var(--bad)');
      aptCell = bar(apt,maxApt,ac)+'<span class="t" style="color:'+ac+'">'+apt+' 場'+(apt===maxApt?'<span class="peak">高峰</span>':'')+'</span>';
      var cost = spend? Math.round(spend/apt) : null;
      var cc = cost==null?'':(cost<=5000?'var(--good)':(cost>=15000?'var(--bad)':''));
      costCell = '<span style="color:'+(cc||'inherit')+'">'+nt(cost)+'</span>';
    }
    return '<tr>'+
      '<td><b>'+r.month+'</b></td>'+
      '<td class="num barcell">'+bar(spend,maxSpend,'rgba(79,142,247,.55)')+'<span class="t">'+nt(spend)+'</span></td>'+
      '<td class="num barcell">'+bar(r.leads,maxLeads,'rgba(63,181,107,.5)')+'<span class="t">'+num(r.leads)+(r.leads===maxLeads?'<span class="peak">最高</span>':'')+'</span></td>'+
      '<td class="num">'+cplCell+'</td>'+
      '<td class="num barcell">'+aptCell+'</td>'+
      '<td class="num">'+costCell+'</td>'+
    '</tr>';
  }).join('');
  var avgCpl = sumLeads? nt(sumSpendAll/sumLeads) : '—';
  var avgCost = sumAppt? nt(sumSpendApt/sumAppt) : '—';
  var foot = '<tr class="sumrow"><td>合計／平均</td>'+
    '<td class="num">'+nt(sumSpendAll)+'</td>'+
    '<td class="num">'+num(sumLeads)+'</td>'+
    '<td class="num">'+avgCpl+'</td>'+
    '<td class="num">'+sumAppt+' 場</td>'+
    '<td class="num">'+avgCost+'</td></tr>';
  $('tOverview').innerHTML = head+rows+foot;
  // 約訪經濟彙總卡
  var convRate = sumLeadsApt? (sumAppt/sumLeadsApt*100).toFixed(1)+'%' : '—';
  $('apptSummary').innerHTML =
    '<div class="b"><div class="n">'+sumAppt+' 場</div><div class="k">累計約成場次（'+(APT.length?APT[0].month+'～'+APT[APT.length-1].month:'')+'）</div></div>'+
    '<div class="b"><div class="n">'+avgCost+'</div><div class="k">平均每場約訪成本（廣告花費 ÷ 約訪）</div></div>'+
    '<div class="b"><div class="n">'+convRate+'</div><div class="k">名單 → 約訪轉換率（'+num(sumAppt)+' ÷ '+num(sumLeadsApt)+' 名單）</div></div>';
}

function renderTables(){
  var mh='<tr><th>月份</th><th class="num">總花費</th><th class="num">名單數</th><th class="num">CPL</th></tr>';
  $('tMonthly').innerHTML = mh + MON.slice().reverse().map(function(r){
    return '<tr><td>'+r.month+'</td><td class="num">'+nt(r.total_spend||r.lead_spend)+'</td><td class="num">'+num(r.leads)+'</td><td class="num">'+nt(r.cpl)+'</td></tr>';
  }).join('');
  var bh='<tr><th>期間</th><th class="num">新增</th><th class="num">累計</th><th class="num">CPL</th></tr>';
  $('tBiweekly').innerHTML = bh + BIW.slice().reverse().map(function(r){
    return '<tr><td>'+r.period+'</td><td class="num">'+num(r.line_added)+'</td><td class="num">'+num(r.line_total)+'</td><td class="num">'+nt(r.cpl)+'</td></tr>';
  }).join('');
}

// ── CHARTS ──
var charts={};
function mk(id, cfg){ if(charts[id]) charts[id].destroy(); charts[id]=new Chart(document.getElementById(id), cfg); }
var GRID={color:'rgba(255,255,255,.06)'}, TICK={color:'#8b93a1',font:{size:11}};

function drawSpend(){
  mk('cSpend',{type:'bar',data:{labels:MON.map(function(r){return r.month;}),datasets:[
    {label:'總花費(NT$)',data:MON.map(function(r){return r.total_spend||r.lead_spend;}),backgroundColor:'rgba(79,142,247,.55)',yAxisID:'y',order:2},
    {label:'CPL(NT$)',data:MON.map(function(r){return r.cpl;}),type:'line',borderColor:'#e0954a',backgroundColor:'#e0954a',tension:.3,yAxisID:'y1',order:1,borderWidth:2,pointRadius:3}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e6e8ec'}}},scales:{
    x:{grid:GRID,ticks:TICK},
    y:{position:'left',grid:GRID,ticks:{...TICK,callback:function(v){return (v/1000)+'k';}}},
    y1:{position:'right',grid:{drawOnChartArea:false},ticks:TICK}
  }}});
}
function drawLine(){
  mk('cLine',{type:'bar',data:{labels:BIW.map(function(r){return r.period.replace(/\(.*\)/,'');}),datasets:[
    {label:'當期新增',data:BIW.map(function(r){return r.line_added;}),backgroundColor:'rgba(6,199,85,.55)',yAxisID:'y1',order:2},
    {label:'累計人數',data:BIW.map(function(r){return r.line_total;}),type:'line',borderColor:'#06c755',backgroundColor:'#06c755',tension:.3,yAxisID:'y',order:1,borderWidth:2,pointRadius:2}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e6e8ec'}}},scales:{
    x:{grid:GRID,ticks:{...TICK,maxRotation:60,minRotation:45}},
    y:{position:'left',grid:GRID,ticks:TICK},
    y1:{position:'right',grid:{drawOnChartArea:false},ticks:TICK}
  }}});
}
function drawAppt(){
  mk('cAppt',{type:'bar',data:{labels:APT.map(function(r){return r.month;}),datasets:[
    {label:'約訪場次',data:APT.map(function(r){return r.appointments;}),backgroundColor:APT.map(function(r){return r.appointments>=15?'rgba(63,181,107,.6)':(r.appointments>=8?'rgba(224,149,74,.6)':'rgba(224,90,90,.6)');})}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
    x:{grid:GRID,ticks:TICK}, y:{grid:GRID,ticks:TICK,beginAtZero:true}
  }}});
}

init();
</script>
</body>
</html>
