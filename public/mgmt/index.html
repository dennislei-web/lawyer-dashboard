<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喆律法律事務所 - 主管會議追蹤</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/view-as.js"></script>
  <style>
    :root {
      --bg-main:#020b18; --bg-card:#0a1628; --bg-row:#111b2e; --bg-hover:#16253d;
      --border:#1e3050; --border-light:#243a5e;
      --gold:#c9a84c; --gold-light:#e8c97a;
      --text:#e0e0e0; --text-muted:#8899aa;
      --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.15);
      --green:#4caf82; --green-dim:rgba(76,175,130,0.15);
      --red:#e05c5c; --red-dim:rgba(224,92,92,0.15);
      --orange:#e0954a; --orange-dim:rgba(224,149,74,0.15);
      --purple:#a87cff; --purple-dim:rgba(168,124,255,0.15);
      --header-bg:rgba(10,22,40,0.95);
      --login-shadow:rgba(0,0,0,0.5);
      --tab-active-bg:rgba(201,168,76,0.12);
      --tab-active-border:rgba(201,168,76,0.2);
      --tab-active-color:var(--gold-light);
      --ghost-bg:rgba(255,255,255,0.07);
      --ghost-hover-bg:rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --bg-main:#f5f6fa; --bg-card:#ffffff; --bg-row:#f0f2f5; --bg-hover:#e8eaf0;
      --border:#d0d5dd; --border-light:#e0e4eb;
      --gold:#a3842a; --gold-light:#8b6f1e;
      --text:#1a1a2e; --text-muted:#6b7280;
      --blue:#2563eb; --blue-dim:rgba(37,99,235,0.1);
      --green:#15803d; --green-dim:rgba(21,128,61,0.12);
      --red:#dc2626; --red-dim:rgba(220,38,38,0.1);
      --orange:#d97706; --orange-dim:rgba(217,119,6,0.1);
      --purple:#7c3aed; --purple-dim:rgba(124,58,237,0.1);
      --header-bg:rgba(255,255,255,0.95);
      --login-shadow:rgba(0,0,0,0.12);
      --tab-active-bg:rgba(37,99,235,0.1);
      --tab-active-border:rgba(37,99,235,0.25);
      --tab-active-color:#2563eb;
      --ghost-bg:rgba(0,0,0,0.04);
      --ghost-hover-bg:rgba(0,0,0,0.08);
    }
    .embed-mode .header { display:none !important; }
    .embed-mode #loginPage { display:none !important; }
    .embed-mode #dashboard { display:block !important; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;
      background:var(--bg-main); color:var(--text); min-height:100vh; font-size:14px;
    }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--bg-main); }
    ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

    /* LOGIN */
    #loginPage {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:20px;
      background:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,0.08) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,rgba(201,168,76,0.06) 0%,transparent 50%),
                 var(--bg-main);
    }
    .login-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:44px 40px; width:100%; max-width:420px; box-shadow:0 24px 64px var(--login-shadow); }
    .login-logo { text-align:center; margin-bottom:28px; }
    .firm-name { font-size:1.6rem; font-weight:700; color:var(--gold-light); letter-spacing:2px; }
    .subtitle { margin-top:6px; font-size:0.85rem; color:var(--text-muted); letter-spacing:1px; }
    .login-divider { height:1px; background:linear-gradient(to right,transparent,var(--border-light),transparent); margin-bottom:28px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
    .form-group input { width:100%; padding:12px 16px; background:var(--bg-row); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; }
    .form-group input:focus { outline:none; border-color:var(--gold); }
    .btn-login { width:100%; padding:13px; background:linear-gradient(135deg,var(--gold),#b8942e); color:#0a0a0a; font-weight:700; font-size:0.95rem; border:none; border-radius:8px; cursor:pointer; margin-top:8px; }
    .btn-login:hover { opacity:0.9; }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .login-error { color:var(--red); font-size:0.85rem; margin-top:12px; text-align:center; display:none; }

    /* HEADER */
    .header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; background:var(--header-bg); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .header-left { display:flex; align-items:center; gap:16px; }
    .header-brand { font-size:1.1rem; font-weight:700; color:var(--gold-light); letter-spacing:1px; }
    .header-subtitle { font-size:0.78rem; color:var(--text-muted); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .btn-icon { background:var(--ghost-bg); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer; padding:6px 10px; font-size:0.85rem; }
    .btn-icon:hover { background:var(--ghost-hover-bg); color:var(--text); }
    .user-badge { font-size:0.8rem; color:var(--text-muted); padding:4px 10px; background:var(--ghost-bg); border-radius:6px; }
    #noAccessPage { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; gap:18px; }

    /* MAIN */
    .main { padding:20px 24px; max-width:1480px; margin:0 auto; }

    /* FILTER BAR */
    .filter-bar { display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:18px; padding:12px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; }
    .filter-bar label { font-size:0.8rem; color:var(--text-muted); }
    .filter-bar select, .filter-bar button {
      background:var(--bg-row); color:var(--text); border:1px solid var(--border); border-radius:6px;
      padding:6px 10px; font-size:0.85rem; cursor:pointer;
    }
    .filter-bar button.btn-primary { background:linear-gradient(135deg,var(--gold),#b8942e); color:#0a0a0a; font-weight:600; border:none; }
    .filter-bar button.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .filter-spacer { flex:1; }

    /* HERO */
    .hero-grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:18px; }
    .hero-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; position:relative; overflow:hidden; }
    .hero-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); }
    .hero-card.kr3::before { background:var(--blue); }
    .hero-card.kr5::before { background:var(--purple); }
    .hero-card.kr4::before { background:var(--orange); }
    .hero-card.kr6::before { background:var(--green); }
    .hero-title { font-size:0.78rem; color:var(--text-muted); margin-bottom:4px; }
    .hero-value { font-size:1.55rem; font-weight:700; color:var(--text); }
    .hero-target { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
    .hero-bar { margin-top:8px; height:6px; background:var(--bg-row); border-radius:3px; overflow:hidden; }
    .hero-bar > div { height:100%; transition:width 0.4s; background:var(--gold); }
    .hero-card.kr3 .hero-bar > div { background:var(--blue); }
    .hero-card.kr5 .hero-bar > div { background:var(--purple); }
    .hero-card.kr4 .hero-bar > div { background:var(--orange); }
    .hero-card.kr6 .hero-bar > div { background:var(--green); }
    .hero-pct { font-size:0.78rem; color:var(--text); margin-top:6px; display:flex; justify-content:space-between; }
    .hero-pct .est { color:var(--text-muted); }
    .hero-pct .pct.bad { color:var(--red); }
    .hero-pct .pct.warn { color:var(--orange); }
    .hero-pct .pct.good { color:var(--green); }

    /* WARNING ALERT */
    .alert-card { background:var(--red-dim); border:1px solid var(--red); border-radius:10px; padding:12px 16px; margin-bottom:18px; display:none; }
    .alert-card.show { display:block; }
    .alert-title { font-size:0.85rem; font-weight:600; color:var(--red); margin-bottom:6px; }
    .alert-list { font-size:0.82rem; color:var(--text); display:flex; flex-wrap:wrap; gap:6px 14px; }
    .alert-list span { display:inline-block; }

    /* KR GRID */
    .kr-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:14px; }
    .kr-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
    .kr-card.full { grid-column:1 / -1; }
    .kr-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; }
    .kr-head h3 { font-size:0.95rem; color:var(--gold-light); font-weight:600; }
    .kr-head .owner { font-size:0.75rem; color:var(--text-muted); padding:2px 8px; background:var(--ghost-bg); border-radius:10px; white-space:nowrap; }
    .kr-deeplink { font-size:0.75rem; color:var(--blue); cursor:pointer; background:none; border:none; padding:0; text-decoration:underline; }
    .kr-deeplink:hover { color:var(--gold); }

    .kr-metric-row { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin-bottom:10px; }
    .kr-metric { background:var(--bg-row); border:1px solid var(--border-light); border-radius:8px; padding:10px 12px; }
    .kr-metric .label { font-size:0.72rem; color:var(--text-muted); margin-bottom:4px; }
    .kr-metric .value { font-size:1.15rem; font-weight:700; color:var(--text); }
    .kr-metric .value .unit { font-size:0.75rem; color:var(--text-muted); margin-left:2px; }
    .kr-metric .target-line { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }
    .kr-metric .pct { font-size:0.72rem; margin-top:2px; font-weight:600; }
    .pct.good { color:var(--green); } .pct.warn { color:var(--orange); } .pct.bad { color:var(--red); }

    .kr-progress { display:flex; align-items:center; gap:10px; margin:6px 0 12px; }
    .kr-progress .bar { flex:1; height:8px; background:var(--bg-row); border-radius:4px; overflow:hidden; border:1px solid var(--border-light); }
    .kr-progress .bar > div { height:100%; background:var(--gold); transition:width 0.3s; }
    .kr-progress .bar > div.bad { background:var(--red); }
    .kr-progress .bar > div.warn { background:var(--orange); }
    .kr-progress .bar > div.good { background:var(--green); }
    .kr-progress .num { font-size:0.78rem; color:var(--text-muted); white-space:nowrap; }

    .kr-chart-wrap { position:relative; height:160px; margin-top:8px; }
    .kr-chart-wrap.tall { height:200px; }

    .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; }
    .badge.green { background:var(--green-dim); color:var(--green); }
    .badge.red { background:var(--red-dim); color:var(--red); }
    .badge.orange { background:var(--orange-dim); color:var(--orange); }
    .badge.blue { background:var(--blue-dim); color:var(--blue); }
    .badge.gray { background:var(--ghost-bg); color:var(--text-muted); }

    /* MILESTONE TABLE */
    .ms-table { width:100%; font-size:0.83rem; margin-top:8px; }
    .ms-table th { text-align:left; padding:6px 8px; color:var(--text-muted); font-weight:500; font-size:0.75rem; border-bottom:1px solid var(--border); }
    .ms-table td { padding:6px 8px; border-bottom:1px solid var(--border-light); }
    .ms-table tr:last-child td { border-bottom:none; }
    .ms-table .status-cell { width:90px; }
    .ms-table .date-cell { width:100px; color:var(--text-muted); white-space:nowrap; }

    /* EDIT MODE */
    .edit-input { background:var(--bg-row); border:1px solid var(--gold); color:var(--text); border-radius:4px; padding:2px 6px; font-size:0.85rem; width:80px; text-align:right; }
    .edit-input:focus { outline:none; border-color:var(--gold-light); box-shadow:0 0 0 2px rgba(201,168,76,0.2); }
    .edit-input.text { width:100%; text-align:left; }
    .edit-input.date { width:120px; }
    .edit-input.select { width:100px; }
    .edit-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; margin-top:8px; }
    .edit-grid .month-input { display:flex; flex-direction:column; gap:2px; }
    .edit-grid .month-input label { font-size:0.65rem; color:var(--text-muted); text-align:center; }
    .edit-grid .month-input input { width:100%; }
    .edit-bar { display:flex; gap:8px; align-items:center; padding:10px 12px; background:var(--gold-light); color:#0a0a0a; border-radius:8px; margin-bottom:14px; font-weight:600; font-size:0.85rem; }
    [data-theme="light"] .edit-bar { background:var(--gold); color:#fff; }
    .edit-bar button { background:rgba(255,255,255,0.85); border:none; border-radius:5px; padding:5px 12px; font-weight:600; cursor:pointer; color:#0a0a0a; }
    .edit-bar button:hover { background:#fff; }
    .edit-bar button.ghost { background:transparent; color:#0a0a0a; border:1px solid rgba(0,0,0,0.3); }
    .edit-bar button.ghost:hover { background:rgba(0,0,0,0.08); }
    .edit-bar .pending-badge { background:var(--red); color:#fff; padding:2px 8px; border-radius:10px; font-size:0.75rem; }

    .manual-grid { display:grid; grid-template-columns:repeat(13, 1fr); gap:3px; font-size:0.72rem; }
    .manual-grid .label-col { font-size:0.72rem; color:var(--text-muted); padding:4px; }
    .manual-grid input { width:100%; padding:4px; font-size:0.78rem; background:var(--bg-row); border:1px solid var(--border); color:var(--text); border-radius:4px; text-align:right; }
    .manual-grid input:focus { outline:none; border-color:var(--gold); }
    .manual-grid .month-h { font-size:0.7rem; text-align:center; color:var(--text-muted); padding:2px 0; }

    /* hint banners */
    .info-hint { background:var(--blue-dim); border:1px solid var(--blue); border-radius:6px; padding:8px 12px; font-size:0.78rem; color:var(--text); margin:8px 0; }
    .info-hint b { color:var(--blue); }

    /* RWD */
    @media (max-width: 1100px) {
      .hero-grid { grid-template-columns:repeat(3, 1fr); }
      .kr-grid { grid-template-columns:1fr; }
    }
    @media (max-width: 720px) {
      .hero-grid { grid-template-columns:repeat(2, 1fr); }
      .main { padding:14px; }
      .kr-metric-row { grid-template-columns:1fr; }
      .manual-grid { grid-template-columns:80px repeat(12, 1fr); font-size:0.65rem; }
    }

    .small-note { font-size:0.72rem; color:var(--text-muted); margin-top:6px; }
    .loading-text { padding:60px 20px; text-align:center; color:var(--text-muted); }

    /* ═══ MEETING TRACKER ═══ */
    .page-tabs { display:flex; gap:4px; padding:0 0 0 4px; margin-bottom:16px; border-bottom:1px solid var(--border); }
    .page-tabs button { background:transparent; border:none; color:var(--text-muted); cursor:pointer;
      padding:10px 18px; font-size:0.9rem; font-weight:500; border-bottom:2px solid transparent;
      white-space:nowrap; font-family:inherit; margin-bottom:-1px; }
    .page-tabs button:hover { color:var(--text); }
    .page-tabs button.active { color:var(--gold-light); border-bottom-color:var(--gold); }
    .page-tabs button .count { background:var(--ghost-bg); border-radius:8px; padding:1px 6px; font-size:0.7rem; margin-left:6px; }
    .page-tabs button.active .count { background:rgba(201,168,76,0.2); color:var(--gold-light); }

    .mt-subtabs { display:flex; gap:2px; margin-bottom:14px; }
    .mt-subtabs button { background:var(--ghost-bg); color:var(--text-muted); border:1px solid var(--border);
      border-radius:6px; padding:6px 12px; font-size:0.83rem; cursor:pointer; font-family:inherit;
      margin-right:4px; }
    .mt-subtabs button:hover { background:var(--bg-hover); color:var(--text); }
    .mt-subtabs button.active { background:var(--gold); color:#0a0a0a; border-color:var(--gold); font-weight:600; }

    .mt-filter-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:12px 14px;
      background:var(--bg-card); border:1px solid var(--border); border-radius:10px; margin-bottom:14px; }
    .mt-filter-row label { font-size:0.75rem; color:var(--text-muted); }
    .mt-filter-row select, .mt-filter-row input {
      background:var(--bg-row); color:var(--text); border:1px solid var(--border); border-radius:6px;
      padding:5px 10px; font-size:0.83rem; font-family:inherit; }
    .mt-filter-row .spacer { flex:1; }
    .mt-filter-row button.primary { background:linear-gradient(135deg,var(--gold),#b8942e); color:#0a0a0a;
      font-weight:600; border:none; border-radius:6px; padding:6px 14px; font-size:0.83rem; cursor:pointer; }

    .action-table { width:100%; background:var(--bg-card); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; border-collapse:collapse; }
    .action-table th { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px;
      color:var(--text-muted); font-weight:500; text-align:left; padding:10px 12px;
      border-bottom:1px solid var(--border); background:var(--bg-row); }
    .action-table th.sortable { cursor:pointer; user-select:none; }
    .action-table th.sortable:hover { color:var(--text); }
    .action-table th.active { color:var(--gold); }
    .action-table th .arr { font-size:0.65rem; }
    .action-table td { padding:11px 12px; border-bottom:1px solid var(--border-light); font-size:0.85rem; vertical-align:top; }
    .action-table tr:last-child td { border-bottom:none; }
    .action-table tr.action-row:hover { background:var(--bg-hover); }
    .action-table .col-title { font-weight:500; color:var(--text); }
    .action-link { font-size:0.72rem; color:var(--blue); text-decoration:none; white-space:nowrap; margin-left:4px; }
    .action-link:hover { color:var(--gold); text-decoration:underline; }
    .action-table .col-title .resolution { display:block; font-size:0.74rem; color:var(--text-muted);
      margin-top:4px; padding-left:10px; border-left:2px solid var(--border-light); line-height:1.4; }
    .action-table .col-owner { white-space:nowrap; }
    .action-table .col-due { white-space:nowrap; color:var(--text-muted); font-size:0.78rem; }
    .action-table .col-due.overdue { color:var(--red); font-weight:600; }
    .action-table .col-actions { white-space:nowrap; text-align:right; }

    .badge-status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; white-space:nowrap; }
    .badge-status.pending     { background:var(--blue-dim);   color:var(--blue); }
    .badge-status.in_progress { background:var(--orange-dim); color:var(--orange); }
    .badge-status.blocked     { background:var(--red-dim);    color:var(--red); }
    .badge-status.done        { background:var(--green-dim);  color:var(--green); }
    .badge-status.dropped     { background:var(--ghost-bg);   color:var(--text-muted); }

    .badge-recur { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; white-space:nowrap; }
    .badge-recur.ongoing { background:rgba(56,189,248,0.15); color:var(--blue); }
    .badge-recur.oneoff  { background:var(--ghost-bg); color:var(--text-muted); }

    .badge-kr { display:inline-block; padding:2px 7px; border-radius:10px; font-size:0.7rem; font-weight:600; }
    .badge-kr.kr1 { background:rgba(201,168,76,0.15); color:var(--gold-light); }
    .badge-kr.kr2 { background:rgba(201,168,76,0.15); color:var(--gold-light); }
    .badge-kr.kr3 { background:var(--blue-dim); color:var(--blue); }
    .badge-kr.kr4 { background:var(--orange-dim); color:var(--orange); }
    .badge-kr.kr5 { background:var(--purple-dim); color:var(--purple); }
    .badge-kr.kr6 { background:var(--green-dim); color:var(--green); }
    .badge-kr.kr7 { background:var(--purple-dim); color:var(--purple); }
    .badge-kr.org { background:var(--ghost-bg); color:var(--text-muted); }

    .carry-badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:10px;
      font-size:0.7rem; font-weight:700; }
    .carry-badge.lv0 { background:var(--ghost-bg); color:var(--text-muted); }
    .carry-badge.lv1 { background:rgba(255,255,255,0.08); color:var(--text); }
    .carry-badge.lv2 { background:var(--orange-dim); color:var(--orange); }
    .carry-badge.lv3 { background:var(--red-dim); color:var(--red); animation:mt-pulse 2s infinite; }
    @keyframes mt-pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    .btn-mini { background:var(--ghost-bg); color:var(--text); border:1px solid var(--border);
      border-radius:5px; padding:3px 8px; font-size:0.72rem; cursor:pointer; font-family:inherit;
      margin-left:3px; }
    .btn-mini:hover { background:var(--bg-hover); }

<script>
var SUPABASE_URL = 'https://zpbkeyhxyykbvownrngf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NvTWZM6IGgc_Jn8iCXFvaA_QnvJsstM';
var sb, currentUser, currentLawyer;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { sb = null; }

// ═══ embed mode ═══
var isEmbed = new URLSearchParams(location.search).get('embed') === '1';
if (isEmbed) document.documentElement.classList.add('embed-mode');
function rerenderCharts() {} // no-op（本頁無圖表，沿用 OKR 主題切換流程）

// ═══ THEME ═══
(function() { var t = localStorage.getItem('theme'); if (t === 'light') document.documentElement.setAttribute('data-theme','light'); })();
window.addEventListener('message', function(e) {
  if (e && e.data && e.data.type === 'theme' && e.data.value) {
    document.documentElement.setAttribute('data-theme', e.data.value === 'light' ? 'light' : '');
    rerenderCharts();
  }
});
document.getElementById('themeToggle').addEventListener('click', function() {

  localStorage.setItem('theme', next === 'light' ? 'light' : 'dark');
  try { window.parent.postMessage({ type:'theme', value: next === 'light' ? 'light' : 'dark' }, '*'); } catch(e) {}
});

// ═══ AUTH ═══
function showLogin() {
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('noAccessPage').style.display='none';
}
function showNoAccess() {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dashboard').style.display='none';
  var p = document.getElementById('noAccessPage'); p.style.display='flex';
  document.getElementById('noAccessUser').textContent = currentLawyer ? currentLawyer.name : '';
}
async function showDashboard() {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('noAccessPage').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userBadge').textContent = currentLawyer ? currentLawyer.name : (currentUser && currentUser.email) || '';
  await loadMeetingTracker();
  renderMeetingTracker();
}
async function loadUserProfile() {
  if (!sb || !currentUser) return;
  var r = await sb.from('lawyers').select('*').eq('auth_user_id', currentUser.id).single();
  if (r.data) currentLawyer = window.ViewAs ? window.ViewAs.apply(r.data) : r.data;
}
async function checkSession() {
  if (!sb) return showLogin();
  var s = await sb.auth.getSession();
  if (s.data.session) {
    currentUser = s.data.session.user; await loadUserProfile();
    if (!currentLawyer || currentLawyer.role !== 'admin') return showNoAccess();
    showDashboard();
  } else showLogin();
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn'), err = document.getElementById('loginError');
  err.style.display='none'; btn.disabled=true; btn.textContent='登入中...';
  try {
    var r = await sb.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value.trim(),
      password: document.getElementById('loginPassword').value
    });
    if (r.error) throw r.error;
    currentUser = r.data.user; await loadUserProfile();
    if (!currentLawyer || currentLawyer.role !== 'admin') return showNoAccess();
    showDashboard();
  } catch(ex) {
    err.textContent='登入失敗：'+(ex.message||'請確認帳號密碼');
    err.style.display='block';
  } finally { btn.disabled=false; btn.textContent='登入'; }
});
document.getElementById('logoutBtn').addEventListener('click', async function() {
  if (sb) await sb.auth.signOut(); currentUser=null; currentLawyer=null; showLogin();
});
document.getElementById('noAccessLogout').addEventListener('click', async function() {
  if (sb) await sb.auth.signOut(); location.reload();
});

// ═══ STATE ═══
var state = { mt: {
  subtab: 'open',
  meetings: [], actions: [], followups: [],
  selectedMeetingId: null,
  filters: { owner:'', category:'', search:'', showDone:false },
  sort: { key:'carry_count', dir:'desc' }
} };

// ═══ MEETING TRACKER ═══
var MEETING_TYPE = 'mgmt_weekly';
var MEETING_TYPE_LABEL = { mgmt_weekly:'主管會議', op_weekly:'營運週會', shareholder:'股東會', monthly_all:'月會', partner_consult:'合署/北所諮詢', one_on_one:'1-on-1', other:'其他' };
var STATUS_LABEL = { pending:'Pending', in_progress:'In Progress', blocked:'Blocked', done:'Done', dropped:'Dropped' };
var ACTION_BUCKET = 'action-attachments';
var ACTION_FILE_MAX = 6 * 1024 * 1024; // 6 MB
var CATEGORIES = ['系統/工程','獎金制度','人資差勤','委前進線','委後/客戶','品牌/官網','知識庫/AI','法顧','行政/空間','其他'];
var OWNER_CHOICES = ['雷皓明','何泓儒','吳泰儀','黃杰','杰峰','桑羽','湘閔','郁萱','光星','又仁','琬琪','飛宇','人資','各所','其他'];

function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function setText(id, v) { var el = document.getElementById(id); if (el) el.textContent = v; }
function nextWeekISO() { var d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0,10); }

async function loadMeetingTracker() {
  if (!sb) return;
  try {
    var r = await Promise.all([
      sb.from('meetings').select('*').eq('meeting_type', MEETING_TYPE).order('meeting_date', { ascending:false }),
      sb.from('meeting_action_items').select('*').order('carry_count', { ascending:false }).order('title'),
      sb.from('action_followups').select('*').order('followup_date', { ascending:false })
    ]);
    var meetings = r[0].data || [];
    var ids = {}; meetings.forEach(function(m){ ids[m.id] = true; });
    state.mt.meetings  = meetings;
    // 只保留屬於本系列（主管會議）會議的 action / followup
    state.mt.actions   = (r[1].data || []).filter(function(a){ return a.source_meeting_id && ids[a.source_meeting_id]; });
    state.mt.followups = (r[2].data || []).filter(function(f){ return f.meeting_id && ids[f.meeting_id]; });
    updateMtCounts();
  } catch (ex) { console.error('loadMeetingTracker', ex); }
}

function updateMtCounts() {
  var open = state.mt.actions.filter(function(a){ return ['pending','in_progress','blocked'].indexOf(a.status) >= 0; });
  var ongoing = open.filter(function(a){ return a.recur_type === 'ongoing'; });
  setText('mtOpenCount', open.length - ongoing.length);
  setText('mtOngoingCount', ongoing.length);
}

// ─── Subtab switching ───
(function bindSubtabs() {
  document.querySelectorAll('#mtSubtabs button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var sub = btn.dataset.sub;
      if (sub === 'add') { showActionModal(null); return; }
      if (sub === 'addmeeting') { showMeetingModal(null); return; }
      document.querySelectorAll('#mtSubtabs button').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      state.mt.subtab = sub;
      renderMeetingTracker();
    });
  });
})();

function renderMeetingTracker() {
  var c = document.getElementById('mt-content');
  c.innerHTML = '';
  var sub = state.mt.subtab;
  if (sub === 'open')    renderOpenActions(c);
  else if (sub === 'ongoing') renderOngoingBoard(c);
  else if (sub === 'meetings') renderMeetingList(c);
}

// ─── Open Actions table ───
function renderOpenActions(container) {
  var bar = document.createElement('div'); bar.className = 'mt-filter-row';
  bar.innerHTML =
    '<label>Owner</label><select id="mtFOwner"><option value="">全部</option>' + OWNER_CHOICES.map(function(o){return '<option>'+o+'</option>';}).join('') + '</select>' +
    '<label>類別</label><select id="mtFCat"><option value="">全部</option>' +
      CATEGORIES.map(function(c){return '<option>'+c+'</option>';}).join('') + '</select>' +
    '<label><input type="checkbox" id="mtFDone" style="margin-right:4px;">含已結案</label>' +
    '<div class="spacer"></div>' +
    '<input id="mtFSearch" placeholder="🔍 搜尋..." style="width:180px;">' +
    '<button class="primary" id="mtBtnAdd">➕ 新增 Action</button>';
  container.appendChild(bar);

  document.getElementById('mtFOwner').value = state.mt.filters.owner;
  document.getElementById('mtFCat').value = state.mt.filters.category;
  document.getElementById('mtFDone').checked = state.mt.filters.showDone;
  document.getElementById('mtFSearch').value = state.mt.filters.search;

  ['mtFOwner','mtFCat','mtFSearch','mtFDone'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener(id === 'mtFSearch' ? 'input' : 'change', function() {
      state.mt.filters.owner = document.getElementById('mtFOwner').value;
      state.mt.filters.category = document.getElementById('mtFCat').value;
      state.mt.filters.search = document.getElementById('mtFSearch').value;
      state.mt.filters.showDone = document.getElementById('mtFDone').checked;
      renderActionTable();
    });
  });
  document.getElementById('mtBtnAdd').addEventListener('click', function(){ showActionModal(null); });

  var wrap = document.createElement('div'); wrap.id = 'mtTableWrap';
  container.appendChild(wrap);
  renderActionTable();

  var note = document.createElement('div'); note.className = 'mt-note';
  note.innerHTML = '<b>用法：</b>每週開完主管會議掃這張表，按「✓ 結案」「↻ Carry」「📝 編輯」「⛔ 放棄」處理。Carry 自動 +1，紅色脈動 = carry≥3（卡住需處理）。點欄位標題可排序。';
  container.appendChild(note);
}

function renderActionTable() {
  var wrap = document.getElementById('mtTableWrap');
  if (!wrap) return;
  var f = state.mt.filters;
  var rows = state.mt.actions.filter(function(a) {
    if ((a.recur_type || 'oneoff') === 'ongoing') return false;
    if (!f.showDone && ['done','dropped'].indexOf(a.status) >= 0) return false;
    if (f.owner && (a.owner||'').indexOf(f.owner) < 0) return false;
    if (f.category && a.category !== f.category) return false;
    if (f.search) {
      var s = f.search.toLowerCase();
      if ((a.title||'').toLowerCase().indexOf(s) < 0 &&
          (a.latest_resolution||'').toLowerCase().indexOf(s) < 0) return false;
    }
    return true;
  });
  if (rows.length === 0) { wrap.innerHTML = '<div class="loading-text">沒有符合條件的 actions</div>'; return; }
  var sort = state.mt.sort;
  var STATUS_RANK = { blocked:0, in_progress:1, pending:2, done:3, dropped:4 };
  function sortVal(a, key) {
    if (key === 'carry_count') return a.carry_count || 0;
    if (key === 'status') return STATUS_RANK[a.status] != null ? STATUS_RANK[a.status] : 9;
    if (key === 'next_review_date') return a.next_review_date || '9999-12-31';
    return (a[key] || '').toString();
  }
  rows.sort(function(x, y) {
    var vx = sortVal(x, sort.key), vy = sortVal(y, sort.key), cmp;
    if (typeof vx === 'number') cmp = vx - vy;
    else cmp = vx.localeCompare(vy, 'zh-Hant');
    if (cmp === 0) cmp = (y.carry_count || 0) - (x.carry_count || 0);
    return sort.dir === 'asc' ? cmp : -cmp;
  });
  var todayISO = new Date().toISOString().slice(0,10);
  var COLS = [
    { key:'title', label:'行動項目', width:'42%' },
    { key:'category', label:'類別' }, { key:'owner', label:'Owner' },
    { key:'status', label:'狀態' }, { key:'carry_count', label:'Carry' }, { key:'next_review_date', label:'下次 Review' }
  ];
  var thead = COLS.map(function(c) {
    var active = sort.key === c.key;
    var arr = active ? (sort.dir === 'asc' ? ' ▲' : ' ▼') : '';
    return '<th class="sortable' + (active ? ' active' : '') + '" data-sort="' + c.key + '"' +
      (c.width ? ' style="width:' + c.width + ';"' : '') + '>' + c.label + '<span class="arr">' + arr + '</span></th>';
  }).join('') + '<th></th>';
  var html = '<table class="action-table"><thead><tr>' + thead + '</tr></thead><tbody>';
  rows.forEach(function(a) {
    var carryLv = a.carry_count >= 3 ? 'lv3' : a.carry_count === 2 ? 'lv2' : a.carry_count === 1 ? 'lv1' : 'lv0';
    var overdueCls = (a.next_review_date && a.next_review_date < todayISO && ['done','dropped'].indexOf(a.status) < 0) ? ' overdue' : '';
    html += '<tr class="action-row" data-id="' + a.id + '">' +
      '<td class="col-title">' + escHtml(a.title) +
        (a.link_url ? ' <a href="'+escHtml(a.link_url)+'" target="_blank" rel="noopener" class="action-link" onclick="event.stopPropagation()" title="開啟連結">🔗 開啟</a>' : '') +
        (a.attachment_path ? ' <a href="#" class="action-link" onclick="event.stopPropagation();openActionAttachment(\''+escHtml(a.attachment_path)+'\');return false;" title="'+escHtml(a.attachment_name||'附件')+'">📎 附件</a>' : '') +
        (a.latest_resolution ? '<span class="resolution">' + escHtml(a.latest_resolution) + '</span>' : '') +
      '</td>' +
      '<td>' + (a.category ? '<span class="badge-kr org">'+escHtml(a.category)+'</span>' : '') + '</td>' +
      '<td class="col-owner">' + escHtml(a.owner || '—') + '</td>' +
      '<td><span class="badge-status '+a.status+'">'+STATUS_LABEL[a.status]+'</span></td>' +
      '<td><span class="carry-badge '+carryLv+'">↻'+a.carry_count+'</span></td>' +
      '<td class="col-due'+overdueCls+'">' + (a.next_review_date || '—') + '</td>' +
      '<td class="col-actions">' +
        '<button class="btn-mini green" data-act="done">✓</button>' +
        '<button class="btn-mini orange" data-act="carry">↻</button>' +
        '<button class="btn-mini blue" data-act="edit">📝</button>' +
        '<button class="btn-mini red" data-act="drop">⛔</button>' +
      '</td></tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('button[data-act]').forEach(function(btn) {
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var id = btn.closest('tr').dataset.id;
      handleQuickAction(id, btn.dataset.act);
    });
  });
  wrap.querySelectorAll('tr.action-row').forEach(function(tr) {
    tr.addEventListener('click', function() { showActionModal(tr.dataset.id); });
  });
  wrap.querySelectorAll('th.sortable').forEach(function(th) {
    th.addEventListener('click', function() {
      var key = th.dataset.sort;
      if (state.mt.sort.key === key) { state.mt.sort.dir = state.mt.sort.dir === 'asc' ? 'desc' : 'asc'; }
      else { state.mt.sort.key = key; state.mt.sort.dir = (key === 'carry_count') ? 'desc' : 'asc'; }
      renderActionTable();
    });
  });
}

// ─── Quick action handlers ───
async function handleQuickAction(actionId, kind) {
  var a = state.mt.actions.find(function(x){return x.id === actionId;});
  if (!a) return;
  var newStatus = a.status, msg = '';
  if (kind === 'done') { msg = prompt('結案說明（選填）：', '') || ''; newStatus = 'done'; }
  else if (kind === 'drop') {
    if (!confirm('確定放棄此 action「' + a.title + '」？')) return;
    msg = prompt('放棄原因（選填）：', '') || ''; newStatus = 'dropped';
  } else if (kind === 'carry') { msg = prompt('Carry-over 說明（這次會議的進展）：', '') || ''; }
  else if (kind === 'edit') { showActionModal(actionId); return; }
  var latestMeeting = state.mt.meetings[0];
  var updates = {
    status: newStatus,
    latest_resolution: msg || a.latest_resolution,
    carry_count: (kind === 'carry') ? (a.carry_count + 1) : a.carry_count,
    closed_at: (newStatus === 'done' || newStatus === 'dropped') ? new Date().toISOString() : null
  };
  try {
    var r = await sb.from('meeting_action_items').update(updates).eq('id', actionId);
    if (r.error) throw r.error;
    await sb.from('action_followups').insert({
      action_item_id: actionId,
      meeting_id: latestMeeting ? latestMeeting.id : null,
      followup_date: new Date().toISOString().slice(0,10),
      status_before: a.status, status_after: newStatus, resolution: msg || null
    });
    await loadMeetingTracker();
    renderMeetingTracker();
  } catch (ex) { alert('更新失敗：' + (ex.message || ex)); }
}

// ─── 持續關注 board ───

      '<div class="carry-card-meta">' +

        (a.category ? '<span><span class="badge-kr org">'+escHtml(a.category)+'</span></span>' : '') +
        '<span>首見 '+sourceDate+'</span>' +
        '<span><span class="badge-status '+a.status+'">'+STATUS_LABEL[a.status]+'</span></span>' +
      '</div>' +
      (a.link_url
        ? '<a class="card-dash-link has-link" href="'+escHtml(a.link_url)+'" target="_blank" rel="noopener">📊 看數據儀表板 →</a>'
        : '<button class="card-dash-link empty" data-act="edit">🔗 設定數據連結</button>') +
      '<div class="carry-timeline">' +
        '<div class="row"><span class="date">'+(sourceDate||'').slice(5)+'</span><span class="what">新增 — '+escHtml((sourceMeeting&&sourceMeeting.title)||'')+'</span></div>' +
        fups.map(function(f) {
          return '<div class="row"><span class="date">'+f.followup_date.slice(5)+'</span><span class="what">'+escHtml(f.resolution || (f.status_before+' → '+f.status_after))+'</span></div>';
        }).join('') +
      '</div>' +
      '<div class="carry-card-foot">' +
        '<button class="btn-mini green" data-act="done">✓ 結案</button>' +
        '<button class="btn-mini orange" data-act="carry">↻ Carry</button>' +
        '<button class="btn-mini blue" data-act="edit">📝 編輯</button>' +
        '<button class="btn-mini red" data-act="drop">⛔ 放棄</button>' +
      '</div>';
    card.querySelectorAll('button[data-act]').forEach(function(btn) {
      btn.addEventListener('click', function(){ handleQuickAction(a.id, btn.dataset.act); });
    });
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

        '<span>👥 '+((sel.attendees||[]).join('、') || '—')+'</span>' +

      '</div>';

      newActions.forEach(function(a) {
        dh += '<div class="item-row">' +
          '<span class="badge-kr org">'+escHtml(a.category||'')+'</span>' +
          '<span class="text">'+escHtml(a.title)+' — '+escHtml(a.owner||'—')+
            ' <span class="badge-status '+a.status+'">'+STATUS_LABEL[a.status]+'</span></span>' +
          '</div>';
      });
    }
    if (fups.length > 0) {
      dh += '<div class="group-label">↻ Follow-up ('+fups.length+')</div>';

        if (!a) return;
        dh += '<div class="item-row">' +
          '<span class="badge-kr org">'+escHtml(a.category||'')+'</span>' +

async function openActionAttachment(path) {
  if (!sb || !path) return;
  var signed = await sb.storage.from(ACTION_BUCKET).createSignedUrl(path, 60);
  if (signed.error || !signed.data) { alert('取得附件失敗：' + (signed.error ? signed.error.message : '')); return; }
  window.open(signed.data.signedUrl, '_blank');
}

// ─── Modal: action create / edit ───
function showActionModal(actionId) {
  var a = actionId ? state.mt.actions.find(function(x){return x.id === actionId;}) : null;
  var isNew = !a;
  if (!a) a = { title:'', category:'其他', owner:'', status:'pending', recur_type:'oneoff',
    source_meeting_id:(state.mt.meetings[0]||{}).id || '',
    next_review_date: nextWeekISO(), notes:'', latest_resolution:'' };

  var html = '<h3>'+(isNew?'➕ 新增 Action':'📝 編輯 Action')+'</h3>' +
    '<div class="form-row"><label>標題 *</label><input id="afTitle" value="'+escHtml(a.title)+'" placeholder="例：續委任與諮詢獎金重複計算釐清"></div>' +
    '<div class="form-row"><label>類別 *</label><select id="afCat">' + CATEGORIES.map(function(c){return '<option '+(c===a.category?'selected':'')+'>'+c+'</option>';}).join('') + '</select></div>' +
    '<div class="form-row"><label>Owner *</label><div id="afOwner" class="owner-checks">' + OWNER_CHOICES.map(function(o){var on=(a.owner||'').split(/[、,]/).map(function(s){return s.trim();}).indexOf(o)>=0;return '<label class="owner-check"><input type="checkbox" value="'+o+'" '+(on?'checked':'')+'>'+o+'</label>';}).join('') + '</div></div>' +
    '<div class="form-row"><label>狀態</label><select id="afStatus">' + Object.keys(STATUS_LABEL).map(function(s){return '<option value="'+s+'" '+(s===a.status?'selected':'')+'>'+STATUS_LABEL[s]+'</option>';}).join('') + '</select></div>' +
    '<div class="form-row"><label>類型</label><select id="afRecur">' +
      '<option value="oneoff" '+((a.recur_type||'oneoff')==='oneoff'?'selected':'')+'>一次性（做完即結案）</option>' +
      '<option value="ongoing" '+(a.recur_type==='ongoing'?'selected':'')+'>持續關注（每週固定 review）</option></select></div>' +
    '<div class="form-row"><label>來源會議</label><select id="afMeeting"><option value="">—</option>' +
      state.mt.meetings.map(function(m){return '<option value="'+m.id+'" '+(m.id===a.source_meeting_id?'selected':'')+'>'+m.meeting_date+' '+(MEETING_TYPE_LABEL[m.meeting_type]||'')+'</option>';}).join('') + '</select></div>' +
    '<div class="form-row"><label>下次 Review</label><input type="date" id="afReview" value="'+(a.next_review_date||'')+'"></div>' +
    '<div class="form-row"><label>連結</label><input id="afLink" value="'+escHtml(a.link_url||'')+'" placeholder="貼上儀表板/文件網址，會在項目旁顯示 🔗 開啟"></div>' +
    '<div class="form-row"><label>附件</label><div class="attach-wrap">' +
      (a.attachment_path ? '<div id="afCurAttach" class="attach-cur"><a href="#" id="afViewAttach">📎 '+escHtml(a.attachment_name||'附件')+'</a><button type="button" id="afRmAttach" class="attach-rm">移除</button></div>' : '') +
      '<input type="file" id="afFile"><div class="attach-hint">任意檔型，上限 6MB' + (a.attachment_path ? '；選新檔會取代舊附件' : '') + '</div>' +
      '<div id="afAttachMsg" class="attach-msg"></div>' +
    '</div></div>' +
    '<div class="form-row tall"><label>最新進度</label><textarea id="afResolution" placeholder="一句話最新狀況">'+escHtml(a.latest_resolution||'')+'</textarea></div>' +
    '<div class="form-row tall"><label>備註</label><textarea id="afNotes" placeholder="脈絡、相關連結...">'+escHtml(a.notes||'')+'</textarea></div>' +
    '<div class="form-actions">' +
      '<button class="btn-primary" id="afSave">儲存</button>' +
      '<button class="btn-ghost" id="afCancel">取消</button>' +
      (isNew ? '' : '<button class="btn-ghost" id="afDelete" style="margin-left:auto; color:var(--red);">🗑 刪除</button>') +
    '</div>';
  openModal(html);
  document.getElementById('afCancel').addEventListener('click', closeModal);

  var origAttachPath = a.attachment_path || null;
  var removeAttach = false;
  var viewBtn = document.getElementById('afViewAttach');
  if (viewBtn) viewBtn.addEventListener('click', function(e) { e.preventDefault(); openActionAttachment(origAttachPath); });
  var rmBtn = document.getElementById('afRmAttach');
  if (rmBtn) rmBtn.addEventListener('click', function() {
    removeAttach = true;
    var cur = document.getElementById('afCurAttach');
    if (cur) cur.innerHTML = '<span class="attach-removed">附件將於儲存時移除</span>';
  });

  document.getElementById('afSave').addEventListener('click', async function() {
    var payload = {
      title: document.getElementById('afTitle').value.trim(),
      category: document.getElementById('afCat').value,
      kr_code: null,
      owner: Array.prototype.slice.call(document.querySelectorAll('#afOwner input:checked')).map(function(c){return c.value;}).join('、'),
      status: document.getElementById('afStatus').value,
      recur_type: document.getElementById('afRecur').value,
      source_meeting_id: document.getElementById('afMeeting').value || null,
      next_review_date: document.getElementById('afReview').value || null,
      link_url: document.getElementById('afLink').value.trim() || null,
      latest_resolution: document.getElementById('afResolution').value || null,
      notes: document.getElementById('afNotes').value || null
    };
    if (!payload.title) { alert('請填標題'); return; }
    if (!payload.owner) { alert('請至少勾選一位 Owner'); return; }
    payload.attachment_path = removeAttach ? null : origAttachPath;
    payload.attachment_name = removeAttach ? null : (a.attachment_name || null);

    var saveBtn = this;
    var msg = document.getElementById('afAttachMsg');
    var fileInput = document.getElementById('afFile');
    var newFile = fileInput && fileInput.files && fileInput.files[0];
    if (newFile && newFile.size > ACTION_FILE_MAX) { alert('檔案太大（上限 6MB）'); return; }

    saveBtn.disabled = true;
    try {
      if (newFile) {
        if (msg) msg.innerHTML = '<span style="color:var(--text-muted);">上傳附件中…</span>';
        var dot = newFile.name.lastIndexOf('.');
        var ext = dot >= 0 ? newFile.name.slice(dot) : '';
        var newPath = crypto.randomUUID() + ext;
        var up = await sb.storage.from(ACTION_BUCKET).upload(newPath, newFile, { upsert:false, contentType: newFile.type || undefined });
        if (up.error) { if (msg) msg.innerHTML = '<span style="color:var(--red);">附件上傳失敗：'+escHtml(up.error.message||'')+'</span>'; saveBtn.disabled=false; return; }
        payload.attachment_path = newPath;
        payload.attachment_name = newFile.name;
      }
      var r;
      if (isNew) { r = await sb.from('meeting_action_items').insert(payload); }
      else       { r = await sb.from('meeting_action_items').update(payload).eq('id', actionId); }
      if (r.error) throw r.error;
      if (origAttachPath && origAttachPath !== payload.attachment_path) {
        var sd = await sb.storage.from(ACTION_BUCKET).remove([origAttachPath]);
        if (sd.error) console.warn('[action] 刪除舊附件失敗（紀錄已更新）:', sd.error);
      }
      closeModal();
      await loadMeetingTracker();
      renderMeetingTracker();
    } catch (ex) { alert('儲存失敗：' + (ex.message || ex)); saveBtn.disabled = false; }
  });
  if (!isNew) {
    document.getElementById('afDelete').addEventListener('click', async function() {
      if (!confirm('確定刪除？這會一併刪除所有 follow-up 紀錄。')) return;
      var r = await sb.from('meeting_action_items').delete().eq('id', actionId);
      if (r.error) { alert('刪除失敗：' + r.error.message); return; }
      if (a.attachment_path) {
        var sd = await sb.storage.from(ACTION_BUCKET).remove([a.attachment_path]);
        if (sd.error) console.warn('[action] 刪除附件失敗（紀錄已刪）:', sd.error);
      }
      closeModal();
      await loadMeetingTracker();
      renderMeetingTracker();
    });
  }
}

    '<div class="form-row"><label>日期 *</label><input type="date" id="mfDate" value="'+m.meeting_date+'"></div>' +
    '<div class="form-row"><label>類型 *</label><select id="mfType">' + Object.keys(MEETING_TYPE_LABEL).map(function(t){return '<option value="'+t+'" '+(t===m.meeting_type?'selected':'')+'>'+MEETING_TYPE_LABEL[t]+'</option>';}).join('') + '</select></div>' +
    '<div class="form-row"><label>標題</label><input id="mfTitle" value="'+escHtml(m.title||'')+'" placeholder="例：主管會議"></div>' +
    '<div class="form-row"><label>參與者</label><input id="mfAttendees" value="'+escHtml((m.attendees||[]).join('、'))+'" placeholder="頓號分隔"></div>' +
    '<div class="form-row"><label>原文件 URL</label><input id="mfUrl" value="'+escHtml(m.source_url||'')+'" placeholder="Google Doc"></div>' +
    '<div class="form-row tall"><label>會議摘要</label><textarea id="mfSummary" placeholder="一段話總結今天討論的重點">'+escHtml(m.summary||'')+'</textarea></div>' +
    '<div class="form-actions">' +
      '<button class="btn-primary" id="mfSave">儲存</button>' +
      '<button class="btn-ghost" id="mfCancel">取消</button>' +
      (isNew ? '' : '<button class="btn-ghost" id="mfDelete" style="margin-left:auto; color:var(--red);">🗑 刪除</button>') +
    '</div>';
  openModal(html);
  document.getElementById('mfCancel').addEventListener('click', closeModal);
  document.getElementById('mfSave').addEventListener('click', async function() {
    var att = document.getElementById('mfAttendees').value.split(/[、,，]/).map(function(s){return s.trim();}).filter(Boolean);
    var payload = {
      meeting_date: document.getElementById('mfDate').value,
      meeting_type: document.getElementById('mfType').value,
      title: document.getElementById('mfTitle').value || null,
      attendees: att,
      source_url: document.getElementById('mfUrl').value || null,
      summary: document.getElementById('mfSummary').value || null
    };
    try {
      var r;
      if (isNew) { r = await sb.from('meetings').insert(payload); }
      else       { r = await sb.from('meetings').update(payload).eq('id', meetingId); }
      if (r.error) throw r.error;
      closeModal();
      await loadMeetingTracker();
      renderMeetingTracker();
    } catch (ex) { alert('儲存失敗：' + (ex.message || ex)); }
  });
  if (!isNew) {
    document.getElementById('mfDelete').addEventListener('click', async function() {
      if (!confirm('確定刪除？相關 follow-up 會保留但取消會議關聯。')) return;
      var r = await sb.from('meetings').delete().eq('id', meetingId);
      if (r.error) { alert('刪除失敗：' + r.error.message); return; }
      closeModal();
      await loadMeetingTracker();
      renderMeetingTracker();
    });
  }
}

function openModal(html) {
  document.getElementById('mtModalContent').innerHTML = html;
  document.getElementById('mtModalBackdrop').classList.add('show');
}
function closeModal() {
  document.getElementById('mtModalBackdrop').classList.remove('show');
  document.getElementById('mtModalContent').innerHTML = '';
}

// ═══ INIT ═══
checkSession();
</script>
</body>
</html>
