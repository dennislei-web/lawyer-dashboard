name: Sync 里長開發記錄表 from Google Sheet

on:
  # 每天台灣 09:00 (UTC 01:00) 自動同步
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: '里民好友數回填天數(留空=只抓最新)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: sync-li-outreach
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth httplib2 google-auth-httplib2

      - name: Run sync_li_outreach
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          python sync_li_outreach.py

      - name: Run sync_li_oa_followers (里民 LINE 好友數)
        env:
          LINE_LIMIN_OA_TOKEN: ${{ secrets.LINE_LIMIN_OA_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
        run: |
          cd scripts
          python sync_li_oa_followers.py

      - name: Run sync_li_consults (里民約成諮詢場次)
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          python sync_li_consults.py
