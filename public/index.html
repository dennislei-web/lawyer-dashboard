<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喆律法律事務所 - 儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-main:#020b18; --bg-card:#0a1628; --bg-row:#111b2e; --bg-hover:#16253d;
      --border:#1e3050; --border-light:#243a5e;
      --gold:#c9a84c; --gold-light:#e8c97a;
      --text:#e0e0e0; --text-muted:#8899aa;
      --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.15);
      --green:#4caf82; --green-dim:rgba(76,175,130,0.15);
      --red:#e05c5c; --red-dim:rgba(224,92,92,0.15);
      --orange:#e0954a; --orange-dim:rgba(224,149,74,0.15);
      --header-bg:rgba(10,22,40,0.95);
      --login-shadow:rgba(0,0,0,0.5);
      --tab-active-bg:rgba(201,168,76,0.12);
      --tab-active-border:rgba(201,168,76,0.2);
      --tab-active-color:var(--gold-light);
      --ghost-bg:rgba(255,255,255,0.07);
      --ghost-hover-bg:rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --bg-main:#f5f6fa; --bg-card:#ffffff; --bg-row:#f0f2f5; --bg-hover:#e8eaf0;
      --border:#d0d5dd; --border-light:#e0e4eb;
      --gold:#a3842a; --gold-light:#8b6f1e;
      --text:#1a1a2e; --text-muted:#6b7280;
      --blue:#2563eb; --blue-dim:rgba(37,99,235,0.1);
      --green:#15803d; --green-dim:rgba(21,128,61,0.12);
      --red:#dc2626; --red-dim:rgba(220,38,38,0.1);
      --orange:#d97706; --orange-dim:rgba(217,119,6,0.1);
      --header-bg:rgba(255,255,255,0.95);
      --login-shadow:rgba(0,0,0,0.12);
      --tab-active-bg:rgba(37,99,235,0.1);
      --tab-active-border:rgba(37,99,235,0.25);
      --tab-active-color:#2563eb;
      --ghost-bg:rgba(0,0,0,0.04);
      --ghost-hover-bg:rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;
      background:var(--bg-main); color:var(--text);
      font-size:14px;
      overflow:hidden; /* shell 本身不捲動；iframe 內部自己捲動 */
    }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--bg-main); }
    ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

    /* LOGIN */
    #loginPage {
      display:flex; align-items:center; justify-content:center;
      height:100vh; padding:20px;
      background: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
                  var(--bg-main);
    }
    .login-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
      padding:44px 40px; width:100%; max-width:420px; box-shadow:0 24px 64px var(--login-shadow);
    }
    .login-logo { text-align:center; margin-bottom:28px; }
    .firm-name { font-size:1.6rem; font-weight:700; color:var(--gold-light); letter-spacing:2px; }
    .subtitle { margin-top:6px; font-size:0.85rem; color:var(--text-muted); letter-spacing:1px; }
    .login-divider { height:1px; background:linear-gradient(to right,transparent,var(--border-light),transparent); margin-bottom:28px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
    .form-group input {
      width:100%; padding:12px 16px; background:var(--bg-row); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:0.95rem; transition:border-color 0.2s;
    }
    .form-group input:focus { outline:none; border-color:var(--gold); }
    .btn-login {
      width:100%; padding:13px; background:linear-gradient(135deg,var(--gold),#b8942e);
      color:#0a0a0a; font-weight:700; font-size:0.95rem; border:none; border-radius:8px;
      cursor:pointer; transition:opacity 0.2s; margin-top:8px;
    }
    .btn-login:hover { opacity:0.9; }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .login-error { color:var(--red); font-size:0.85rem; margin-top:12px; text-align:center; display:none; }

    /* SHELL */
    #shell {
      display:flex; flex-direction:column; height:100vh;
    }
    .header {
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; height:56px;
      background:var(--header-bg); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .header-left { display:flex; align-items:center; gap:20px; min-width:0; flex:1; }
    .header-brand { font-size:1.1rem; font-weight:700; color:var(--gold-light); letter-spacing:1px; white-space:nowrap; }
    .nav-links { display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .nav-links::-webkit-scrollbar { display:none; }
    .nav-link {
      padding:6px 14px; font-size:0.85rem; font-weight:500;
      color:var(--text-muted); text-decoration:none; white-space:nowrap;
      border:1px solid transparent; border-radius:8px;
      cursor:pointer; transition:all 0.15s; flex-shrink:0;
    }
    .nav-link:hover { background:var(--ghost-bg); color:var(--text); }
    .nav-link.active {
      background:var(--tab-active-bg); border-color:var(--tab-active-border);
      color:var(--tab-active-color); font-weight:600;
    }
    .header-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .user-badge { font-size:0.8rem; color:var(--text-muted); padding:4px 10px; background:var(--ghost-bg); border-radius:6px; white-space:nowrap; }
    .btn-icon {
      background:var(--ghost-bg); border:1px solid var(--border); border-radius:8px;
      color:var(--text-muted); cursor:pointer; padding:6px 10px; font-size:0.85rem;
      transition:all 0.15s;
    }
    .btn-icon:hover { background:var(--ghost-hover-bg); color:var(--text); }

    #contentFrame {
      flex:1 1 auto;
      width:100%;
      border:none;
      background:var(--bg-main);
      display:block;
    }

    /* RESPONSIVE */
    @media (max-width:640px) {
      body { font-size:13px; }
      .header {
        flex-wrap:wrap; height:auto; padding:8px 12px; gap:6px;
      }
      .header-left {
        width:100%; gap:10px;
      }
      .header-brand { font-size:0.95rem; letter-spacing:0.5px; }
      .nav-links { flex:1; gap:2px; }
      .nav-link { padding:4px 10px; font-size:0.76rem; }
      .header-right {
        width:100%; justify-content:flex-end; gap:6px;
        overflow-x:auto; -webkit-overflow-scrolling:touch;
      }
      .header-right .btn-icon { font-size:0.72rem; padding:4px 8px; }
      .user-badge { font-size:0.72rem; padding:3px 8px; }
      #contentFrame {
        /* 手機上 header 會變兩列，讓 iframe 用 calc 自動吃剩餘 */
        min-height:calc(100vh - 100px);
      }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="firm-name">喆律法律事務所</div>
      <div class="subtitle">儀表板</div>
    </div>
    <div class="login-divider"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>電子郵件</label>
        <input type="email" id="loginEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登入</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- SHELL -->
<div id="shell" style="display:none">
  <div class="header">
    <div class="header-left">
      <span class="header-brand">喆律法律事務所</span>
      <div class="nav-links" id="navLinks">
        <a class="nav-link active" data-route="consultation" href="#/consultation" onclick="switchRoute('consultation');return false;">諮詢分析</a>
        <a class="nav-link" data-route="revenue" data-restricted="1" href="#/revenue" onclick="switchRoute('revenue');return false;">營運</a>
        <a class="nav-link" data-route="finance" data-restricted="1" href="#/finance" onclick="switchRoute('finance');return false;">財務規劃</a>
        <a class="nav-link" data-route="partners" data-restricted="1" href="#/partners" onclick="switchRoute('partners');return false;">合署律師</a>
        <a id="navAdmin" class="nav-link" data-route="admin" data-admin-only="1" href="#/admin" onclick="switchRoute('admin');return false;" style="display:none">🔑 帳號管理</a>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-icon" id="themeToggle" title="切換主題">&#x1f313;</button>
      <button class="btn-icon" id="logoutBtn" title="登出">登出</button>
    </div>
  </div>
  <iframe id="contentFrame" src="" title="dashboard"></iframe>
</div>

<script>
var SUPABASE_URL = 'https://zpbkeyhxyykbvownrngf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NvTWZM6IGgc_Jn8iCXFvaA_QnvJsstM';
var sb, currentUser, currentLawyer;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { sb = null; }

// ═══ ROUTES ═══
var BASE = 'https://dennislei-web.github.io/lawyer-dashboard';
// Cache-bust tag — 每小時換一次，避免部署後使用者看到舊 iframe 內容
var _CB = 'v=' + Math.floor(Date.now() / (60*60*1000));
var ROUTES = {
  consultation: BASE + '/consultation/?embed=1&' + _CB,
  revenue:      BASE + '/revenue/?embed=1&' + _CB,
  finance:      BASE + '/finance/?embed=1&' + _CB,
  partners:     BASE + '/partners/?embed=1&' + _CB,
  admin:        BASE + '/admin/?embed=1&' + _CB,
};

function getRouteFromHash() {
  var m = (window.location.hash || '').match(/^#\/([a-z]+)/);
  var r = m ? m[1] : 'consultation';
  return ROUTES[r] ? r : 'consultation';
}

function switchRoute(route) {
  if (!ROUTES[route]) route = 'consultation';
  // 權限檢查：沒權限的路由直接拒絕
  if (!canAccessRoute(route)) {
    alert('您沒有權限存取此儀表板');
    return;
  }
  var iframe = document.getElementById('contentFrame');
  if (iframe.src !== ROUTES[route]) iframe.src = ROUTES[route];
  // 更新 active
  document.querySelectorAll('.nav-link').forEach(function(l) {
    l.classList.toggle('active', l.getAttribute('data-route') === route);
  });
  if (window.location.hash !== '#/' + route) {
    try { history.replaceState(null, '', '#/' + route); } catch(e) { window.location.hash = '#/' + route; }
  }
  // iframe 載入後推 theme
  setTimeout(function() {
    try {
      var theme = localStorage.getItem('theme') || 'dark';
      if (iframe.contentWindow) iframe.contentWindow.postMessage({ type:'theme', value:theme }, '*');
    } catch(e) {}
  }, 300);
}

function canAccessRoute(route) {
  if (!currentLawyer) return false;
  if (route === 'consultation') return true; // 所有登入者都可看
  if (route === 'admin') return currentLawyer.role === 'admin';
  // revenue / finance / partners → admin / manager / can_view_all
  var role = currentLawyer.role;
  return role === 'admin' || role === 'manager' || currentLawyer.can_view_all === true;
}

function updateNavVisibility() {
  var role = currentLawyer ? currentLawyer.role : null;
  var canViewAll = currentLawyer && currentLawyer.can_view_all === true;
  var canSeeFull = role === 'admin' || role === 'manager' || canViewAll;

  document.querySelectorAll('.nav-link[data-restricted]').forEach(function(l) {
    l.style.display = canSeeFull ? '' : 'none';
  });
  var navAdmin = document.getElementById('navAdmin');
  if (navAdmin) navAdmin.style.display = role === 'admin' ? '' : 'none';
}

// ═══ AUTH ═══
async function checkSession() {
  if (!sb) return showLogin();
  var s = await sb.auth.getSession();
  if (s.data.session) {
    currentUser = s.data.session.user;
    await loadUserProfile();
    showShell();
  } else {
    showLogin();
  }
}
async function loadUserProfile() {
  if (!sb || !currentUser) return;
  var r = await sb.from('lawyers').select('*').eq('auth_user_id', currentUser.id).single();
  if (r.data) currentLawyer = r.data;
}
function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('shell').style.display = 'none';
}
function showShell() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  document.getElementById('userBadge').textContent = currentLawyer ? currentLawyer.name : (currentUser && currentUser.email) || '';
  updateNavVisibility();

  // 初始路由 — 若 hash 指定不可存取的 route，退回 consultation
  var initial = getRouteFromHash();
  if (!canAccessRoute(initial)) initial = 'consultation';
  switchRoute(initial);
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn'), err = document.getElementById('loginError');
  err.style.display = 'none'; btn.disabled = true; btn.textContent = '登入中...';
  try {
    var r = await sb.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value.trim(),
      password: document.getElementById('loginPassword').value,
    });
    if (r.error) throw r.error;
    currentUser = r.data.user;
    await loadUserProfile();
    showShell();
  } catch (ex) {
    err.textContent = '登入失敗：' + (ex.message || '請確認帳號密碼');
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async function() {
  if (sb) await sb.auth.signOut();
  currentUser = null; currentLawyer = null;
  showLogin();
});

// ═══ HASH ROUTING ═══
window.addEventListener('hashchange', function() {
  if (document.getElementById('shell').style.display === 'none') return;
  var r = getRouteFromHash();
  if (!canAccessRoute(r)) r = 'consultation';
  switchRoute(r);
});

// ═══ THEME ═══
function _applyTheme(v) {
  document.documentElement.setAttribute('data-theme', v === 'light' ? 'light' : '');
  var b = document.getElementById('themeToggle');
  if (b) b.innerHTML = v === 'light' ? '&#9728;' : '&#x1f313;';
}
_applyTheme(localStorage.getItem('theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', function() {
  var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  _applyTheme(next);
  localStorage.setItem('theme', next);
  // 推給 iframe
  try {
    var f = document.getElementById('contentFrame');
    if (f && f.contentWindow) f.contentWindow.postMessage({ type:'theme', value:next }, '*');
  } catch(e) {}
});
window.addEventListener('storage', function(e) {
  if (e.key === 'theme' && e.newValue) _applyTheme(e.newValue);
});
window.addEventListener('message', function(e) {
  if (e && e.data && e.data.type === 'theme' && e.data.value) {
    _applyTheme(e.data.value);
    localStorage.setItem('theme', e.data.value);
  }
});

// iframe 載入完成時推送 theme
document.getElementById('contentFrame').addEventListener('load', function() {
  try {
    var theme = localStorage.getItem('theme') || 'dark';
    var f = document.getElementById('contentFrame');
    if (f && f.contentWindow) f.contentWindow.postMessage({ type:'theme', value:theme }, '*');
  } catch(e) {}
});

// ═══ START ═══
checkSession();
</script>
</body>
</html>
