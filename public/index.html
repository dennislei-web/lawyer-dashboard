<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喆律法律事務所 - 儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-main:#020b18; --bg-card:#0a1628; --bg-row:#111b2e; --bg-hover:#16253d;
      --border:#1e3050; --border-light:#243a5e;
      --gold:#c9a84c; --gold-light:#e8c97a;
      --text:#e0e0e0; --text-muted:#8899aa;
      --blue:#4f8ef7; --blue-dim:rgba(79,142,247,0.15);
      --green:#4caf82; --green-dim:rgba(76,175,130,0.15);
      --red:#e05c5c; --red-dim:rgba(224,92,92,0.15);
      --orange:#e0954a; --orange-dim:rgba(224,149,74,0.15);
      --header-bg:rgba(10,22,40,0.95);
      --login-shadow:rgba(0,0,0,0.5);
      --tab-active-bg:rgba(201,168,76,0.12);
      --tab-active-border:rgba(201,168,76,0.2);
      --tab-active-color:var(--gold-light);
      --ghost-bg:rgba(255,255,255,0.07);
      --ghost-hover-bg:rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --bg-main:#f5f6fa; --bg-card:#ffffff; --bg-row:#f0f2f5; --bg-hover:#e8eaf0;
      --border:#d0d5dd; --border-light:#e0e4eb;
      --gold:#a3842a; --gold-light:#8b6f1e;
      --text:#1a1a2e; --text-muted:#6b7280;
      --blue:#2563eb; --blue-dim:rgba(37,99,235,0.1);
      --green:#15803d; --green-dim:rgba(21,128,61,0.12);
      --red:#dc2626; --red-dim:rgba(220,38,38,0.1);
      --orange:#d97706; --orange-dim:rgba(217,119,6,0.1);
      --header-bg:rgba(255,255,255,0.95);
      --login-shadow:rgba(0,0,0,0.12);
      --tab-active-bg:rgba(37,99,235,0.1);
      --tab-active-border:rgba(37,99,235,0.25);
      --tab-active-color:#2563eb;
      --ghost-bg:rgba(0,0,0,0.04);
      --ghost-hover-bg:rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;
      background:var(--bg-main); color:var(--text);
      font-size:14px;
      overflow:hidden; /* shell 本身不捲動；iframe 內部自己捲動 */
    }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--bg-main); }
    ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

    /* LOGIN */
    #loginPage {
      display:flex; align-items:center; justify-content:center;
      height:100vh; padding:20px;
      background: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
                  var(--bg-main);
    }
    .login-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
      padding:44px 40px; width:100%; max-width:420px; box-shadow:0 24px 64px var(--login-shadow);
    }
    .login-logo { text-align:center; margin-bottom:28px; }
    .firm-name { font-size:1.6rem; font-weight:700; color:var(--gold-light); letter-spacing:2px; }
    .subtitle { margin-top:6px; font-size:0.85rem; color:var(--text-muted); letter-spacing:1px; }
    .login-divider { height:1px; background:linear-gradient(to right,transparent,var(--border-light),transparent); margin-bottom:28px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
    .form-group input {
      width:100%; padding:12px 16px; background:var(--bg-row); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:0.95rem; transition:border-color 0.2s;
    }
    .form-group input:focus { outline:none; border-color:var(--gold); }
    .btn-login {
      width:100%; padding:13px; background:linear-gradient(135deg,var(--gold),#b8942e);
      color:#0a0a0a; font-weight:700; font-size:0.95rem; border:none; border-radius:8px;
      cursor:pointer; transition:opacity 0.2s; margin-top:8px;
    }
    .btn-login:hover { opacity:0.9; }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .login-error { color:var(--red); font-size:0.85rem; margin-top:12px; text-align:center; display:none; }

    /* SHELL */
    #shell {
      display:flex; flex-direction:column; height:100vh;
    }
    .header {
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; height:56px;
      background:var(--header-bg); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .header-left { display:flex; align-items:center; gap:20px; min-width:0; flex:1; }
    .header-brand { font-size:1.1rem; font-weight:700; color:var(--gold-light); letter-spacing:1px; white-space:nowrap; }
    .nav-links { display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .nav-links::-webkit-scrollbar { display:none; }
    .nav-link {
      padding:6px 14px; font-size:0.85rem; font-weight:500;
      color:var(--text-muted); text-decoration:none; white-space:nowrap;
      border:1px solid transparent; border-radius:8px;
      cursor:pointer; transition:all 0.15s; flex-shrink:0;
    }
    .nav-link:hover { background:var(--ghost-bg); color:var(--text); }
    .nav-link.active {
      background:var(--tab-active-bg); border-color:var(--tab-active-border);
      color:var(--tab-active-color); font-weight:600;
    }
    .header-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .user-badge { font-size:0.8rem; color:var(--text-muted); padding:4px 10px; background:var(--ghost-bg); border-radius:6px; white-space:nowrap; }
    .btn-icon {
      background:var(--ghost-bg); border:1px solid var(--border); border-radius:8px;
      color:var(--text-muted); cursor:pointer; padding:6px 10px; font-size:0.85rem;
      transition:all 0.15s;
    }
    .btn-icon:hover { background:var(--ghost-hover-bg); color:var(--text); }

    /* MODAL */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
      align-items:center; justify-content:center; padding:20px;
    }
    .modal-overlay.active { display:flex; }
    .modal-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
      padding:28px; width:100%; max-width:400px; box-shadow:0 24px 64px var(--login-shadow);
    }
    .modal-card h2 { font-size:1.1rem; color:var(--gold-light); margin-bottom:18px; letter-spacing:1px; }
    .modal-card .form-group { margin-bottom:14px; }
    .modal-card label { display:block; font-size:0.78rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
    .modal-card input {
      width:100%; padding:10px 14px; background:var(--bg-row); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:0.9rem; transition:border-color 0.2s;
    }
    .modal-card input:focus { outline:none; border-color:var(--gold); }
    .modal-actions { display:flex; gap:10px; margin-top:18px; }
    .btn-primary, .btn-outline {
      flex:1; padding:10px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.2s;
    }
    .btn-primary { background:linear-gradient(135deg,var(--gold),#b8942e); color:#0a0a0a; border:none; }
    .btn-primary:hover { opacity:0.9; }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-outline:hover { background:var(--ghost-bg); }
    .modal-msg { font-size:0.85rem; margin-bottom:12px; display:none; padding:8px 12px; border-radius:6px; }
    .modal-msg.error { color:var(--red); background:var(--red-dim); }
    .modal-msg.success { color:var(--green); background:var(--green-dim); }

    #framesHost {
      flex:1 1 auto;
      position:relative;
      width:100%;
      min-height:0;
      background:var(--bg-main);
    }
    .route-frame {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      background:var(--bg-main);
      display:none;
    }
    .route-frame.active { display:block; }

    /* RESPONSIVE */
    @media (max-width:640px) {
      body { font-size:13px; }
      .header {
        flex-wrap:wrap; height:auto; padding:8px 12px; gap:6px;
      }
      .header-left {
        width:100%; gap:10px;
      }
      .header-brand { font-size:0.95rem; letter-spacing:0.5px; }
      .nav-links { flex:1; gap:2px; }
      .nav-link { padding:4px 10px; font-size:0.76rem; }
      .header-right {
        width:100%; justify-content:flex-end; gap:6px;
        overflow-x:auto; -webkit-overflow-scrolling:touch;
      }
      .header-right .btn-icon { font-size:0.72rem; padding:4px 8px; }
      .user-badge { font-size:0.72rem; padding:3px 8px; }
      #contentFrame {
        /* 手機上 header 會變兩列，讓 iframe 用 calc 自動吃剩餘 */
        min-height:calc(100vh - 100px);
      }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="firm-name">喆律法律事務所</div>
      <div class="subtitle">儀表板</div>
    </div>
    <div class="login-divider"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>電子郵件</label>
        <input type="email" id="loginEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登入</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- SHELL -->
<div id="shell" style="display:none">
  <div class="header">
    <div class="header-left">
      <span class="header-brand">喆律法律事務所</span>
      <div class="nav-links" id="navLinks">
        <a class="nav-link active" data-route="consultation" href="#/consultation" onclick="switchRoute('consultation');return false;">諮詢分析</a>
        <a class="nav-link" data-route="revenue" data-restricted="1" href="#/revenue" onclick="switchRoute('revenue');return false;">營運</a>
        <a class="nav-link" data-route="finance" data-restricted="1" href="#/finance" onclick="switchRoute('finance');return false;">財務規劃</a>
        <a class="nav-link" data-route="partners" data-restricted="1" href="#/partners" onclick="switchRoute('partners');return false;">合署律師</a>
        <a class="nav-link" data-route="evidence" data-restricted="1" href="#/evidence" onclick="switchRoute('evidence');return false;">當事人檔案</a>
        <a id="navAdmin" class="nav-link" data-route="admin" data-admin-only="1" href="#/admin" onclick="switchRoute('admin');return false;" style="display:none">🔑 帳號管理</a>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-icon" id="themeToggle" title="切換主題">&#x1f313;</button>
      <button class="btn-icon" id="changePwdBtn" title="修改密碼">修改密碼</button>
      <button class="btn-icon" id="logoutBtn" title="登出">登出</button>
    </div>
  </div>
  <div id="framesHost">
    <iframe class="route-frame" data-route="consultation" src="" title="consultation"></iframe>
    <iframe class="route-frame" data-route="revenue"      src="" title="revenue"></iframe>
    <iframe class="route-frame" data-route="finance"      src="" title="finance"></iframe>
    <iframe class="route-frame" data-route="partners"     src="" title="partners"></iframe>
    <iframe class="route-frame" data-route="evidence"     src="" title="evidence"></iframe>
    <iframe class="route-frame" data-route="admin"        src="" title="admin"></iframe>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal-card">
    <h2>修改密碼</h2>
    <div class="modal-msg error" id="pwdError"></div>
    <div class="modal-msg success" id="pwdSuccess">密碼修改成功！</div>
    <form id="passwordForm">
      <div class="form-group">
        <label>新密碼</label>
        <input type="password" id="newPassword" minlength="6" placeholder="至少 6 個字元" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>確認新密碼</label>
        <input type="password" id="confirmPassword" minlength="6" placeholder="再次輸入新密碼" required autocomplete="new-password">
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary" id="pwdSubmitBtn">確認修改</button>
        <button type="button" class="btn-outline" id="pwdCancelBtn">取消</button>
      </div>
    </form>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://zpbkeyhxyykbvownrngf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NvTWZM6IGgc_Jn8iCXFvaA_QnvJsstM';
var sb, currentUser, currentLawyer;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { sb = null; }

// ═══ ROUTES ═══
var BASE = 'https://dennislei-web.github.io/lawyer-dashboard';
// 不主動 cache-bust，讓瀏覽器照 GitHub Pages 的 Cache-Control 做快取
// 部署新版後使用者硬重整 shell 即可載到最新 iframe
var ROUTES = {
  consultation: BASE + '/consultation/?embed=1',
  revenue:      BASE + '/revenue/?embed=1',
  finance:      BASE + '/finance/?embed=1',
  partners:     BASE + '/partners/?embed=1',
  evidence:     BASE + '/evidence/?embed=1',
  admin:        BASE + '/admin/?embed=1',
};

function getRouteFromHash() {
  var m = (window.location.hash || '').match(/^#\/([a-z]+)/);
  var r = m ? m[1] : 'consultation';
  return ROUTES[r] ? r : 'consultation';
}

// 追蹤每個 route 是否已經載入（避免重複 fetch）
var loadedRoutes = {};

function switchRoute(route) {
  if (!ROUTES[route]) route = 'consultation';
  // 權限檢查：沒權限的路由直接拒絕
  if (!canAccessRoute(route)) {
    alert('您沒有權限存取此儀表板');
    return;
  }

  // 更新 nav active
  document.querySelectorAll('.nav-link').forEach(function(l) {
    l.classList.toggle('active', l.getAttribute('data-route') === route);
  });

  // show/hide iframes（首次訪問才設 src）
  document.querySelectorAll('.route-frame').forEach(function(f) {
    f.classList.remove('active');
  });
  var target = document.querySelector('.route-frame[data-route="' + route + '"]');
  if (target) {
    if (!loadedRoutes[route]) {
      target.src = ROUTES[route];
      loadedRoutes[route] = true;
    }
    target.classList.add('active');

    // 推 theme 給當前 iframe
    setTimeout(function() {
      try {
        var theme = localStorage.getItem('theme') || 'dark';
        if (target.contentWindow) target.contentWindow.postMessage({ type:'theme', value:theme }, '*');
      } catch(e) {}
    }, 300);
  }

  // update hash
  if (window.location.hash !== '#/' + route) {
    try { history.replaceState(null, '', '#/' + route); } catch(e) { window.location.hash = '#/' + route; }
  }
}

function canAccessRoute(route) {
  if (!currentLawyer) return false;
  if (route === 'consultation') return true; // 所有登入者都可看
  // 其他 3 個儀表板 + admin 頁：只有 admin
  return currentLawyer.role === 'admin';
}

function updateNavVisibility() {
  var role = currentLawyer ? currentLawyer.role : null;
  var isAdmin = role === 'admin';

  // 律師/主管只看到「諮詢分析」，其他 nav 全部隱藏（含 restricted 和 admin）
  document.querySelectorAll('.nav-link[data-restricted]').forEach(function(l) {
    l.style.display = isAdmin ? '' : 'none';
  });
  var navAdmin = document.getElementById('navAdmin');
  if (navAdmin) navAdmin.style.display = isAdmin ? '' : 'none';
}

// ═══ AUTH ═══
async function checkSession() {
  if (!sb) return showLogin();
  var s = await sb.auth.getSession();
  if (s.data.session) {
    currentUser = s.data.session.user;
    await loadUserProfile();
    showShell();
  } else {
    showLogin();
  }
}
async function loadUserProfile() {
  if (!sb || !currentUser) return;
  var r = await sb.from('lawyers').select('*').eq('auth_user_id', currentUser.id).single();
  if (r.data) currentLawyer = r.data;
}
function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('shell').style.display = 'none';
}
function showShell() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  document.getElementById('userBadge').textContent = currentLawyer ? currentLawyer.name : (currentUser && currentUser.email) || '';
  updateNavVisibility();

  // 初始路由 — 若 hash 指定不可存取的 route，退回 consultation
  var initial = getRouteFromHash();
  if (!canAccessRoute(initial)) initial = 'consultation';
  switchRoute(initial);
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn'), err = document.getElementById('loginError');
  err.style.display = 'none'; btn.disabled = true; btn.textContent = '登入中...';
  try {
    var r = await sb.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value.trim(),
      password: document.getElementById('loginPassword').value,
    });
    if (r.error) throw r.error;
    // Full-page reload on login guarantees all iframes initialize with the fresh session,
    // without the infinite-loop risk of auth-event-driven iframe reloads.
    location.reload();
    return;
  } catch (ex) {
    err.textContent = '登入失敗：' + (ex.message || '請確認帳號密碼');
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async function() {
  if (sb) await sb.auth.signOut();
  // Full reload on logout ensures iframes clear their cached Supabase client state too.
  location.reload();
});

// ═══ CHANGE PASSWORD ═══
var pwdModal      = document.getElementById('passwordModal');
var pwdErrorEl    = document.getElementById('pwdError');
var pwdSuccessEl  = document.getElementById('pwdSuccess');
var pwdNewInput   = document.getElementById('newPassword');
var pwdConfInput  = document.getElementById('confirmPassword');
var pwdSubmitBtn  = document.getElementById('pwdSubmitBtn');

function openPwdModal() {
  pwdErrorEl.style.display = 'none';
  pwdSuccessEl.style.display = 'none';
  pwdNewInput.value = '';
  pwdConfInput.value = '';
  pwdModal.classList.add('active');
  setTimeout(function() { pwdNewInput.focus(); }, 50);
}
function closePwdModal() { pwdModal.classList.remove('active'); }
function showPwdError(msg) { pwdErrorEl.textContent = msg; pwdErrorEl.style.display = 'block'; }

document.getElementById('changePwdBtn').addEventListener('click', openPwdModal);
document.getElementById('pwdCancelBtn').addEventListener('click', closePwdModal);
pwdModal.addEventListener('click', function(e) {
  if (e.target === pwdModal) closePwdModal();
});

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  pwdErrorEl.style.display = 'none';
  pwdSuccessEl.style.display = 'none';

  var newPwd = pwdNewInput.value;
  var confPwd = pwdConfInput.value;
  if (newPwd.length < 6) { showPwdError('密碼至少 6 個字元'); return; }
  if (newPwd !== confPwd) { showPwdError('兩次密碼不一致'); return; }
  if (!sb) { showPwdError('Supabase 未設定'); return; }

  pwdSubmitBtn.disabled = true;
  pwdSubmitBtn.textContent = '修改中...';
  try {
    var r = await sb.auth.updateUser({ password: newPwd });
    if (r.error) {
      showPwdError('修改失敗：' + r.error.message);
    } else {
      pwdSuccessEl.style.display = 'block';
      setTimeout(closePwdModal, 1500);
    }
  } catch (ex) {
    showPwdError('修改失敗：' + (ex.message || '未知錯誤'));
  } finally {
    pwdSubmitBtn.disabled = false;
    pwdSubmitBtn.textContent = '確認修改';
  }
});

// ═══ Session lifecycle ═══
// NOTE: We used to subscribe to onAuthStateChange to auto-reload iframes, but that
// fires whenever ANY iframe writes to localStorage auth state — causing an infinite
// reload loop. Instead: force full-page reload on explicit login/logout form actions
// (see below). For idle-expiry, the visibilitychange handler already reloads.

// If the tab was backgrounded long enough for the access token to expire (default 1 h),
// just reload the shell when the user comes back — cheaper than reconciling stale iframe state.
var lastActiveAt = Date.now();
document.addEventListener('visibilitychange', function () {
  if (document.hidden) { lastActiveAt = Date.now(); return; }
  if (Date.now() - lastActiveAt > 30 * 60 * 1000) {
    location.reload();
  }
});

// ═══ HASH ROUTING ═══
window.addEventListener('hashchange', function() {
  if (document.getElementById('shell').style.display === 'none') return;
  var r = getRouteFromHash();
  if (!canAccessRoute(r)) r = 'consultation';
  switchRoute(r);
});

// ═══ THEME ═══
function _applyTheme(v) {
  document.documentElement.setAttribute('data-theme', v === 'light' ? 'light' : '');
  var b = document.getElementById('themeToggle');
  if (b) b.innerHTML = v === 'light' ? '&#9728;' : '&#x1f313;';
}
_applyTheme(localStorage.getItem('theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', function() {
  var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  _applyTheme(next);
  localStorage.setItem('theme', next);
  // 推給所有已載入的 iframe
  document.querySelectorAll('.route-frame').forEach(function(f) {
    try {
      if (f.contentWindow && f.src) f.contentWindow.postMessage({ type:'theme', value:next }, '*');
    } catch(e) {}
  });
});
window.addEventListener('storage', function(e) {
  if (e.key === 'theme' && e.newValue) _applyTheme(e.newValue);
});
window.addEventListener('message', function(e) {
  if (e && e.data && e.data.type === 'theme' && e.data.value) {
    _applyTheme(e.data.value);
    localStorage.setItem('theme', e.data.value);
  }
});

// 各 iframe 載入完成時推送 theme
document.querySelectorAll('.route-frame').forEach(function(frame) {
  frame.addEventListener('load', function() {
    try {
      var theme = localStorage.getItem('theme') || 'dark';
      if (frame.contentWindow) frame.contentWindow.postMessage({ type:'theme', value:theme }, '*');
    } catch(e) {}
  });
});

// ═══ START ═══
checkSession();
</script>
</body>
</html>
