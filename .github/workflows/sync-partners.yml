name: Sync partners dashboard

on:
  # 不跑 cron — 改由儀表板上的「立即同步」按鈕觸發
  # （透過 Supabase Edge Function trigger_partners_sync）
  workflow_dispatch:

permissions:
  contents: write  # 推送 commit 到 main

concurrency:
  group: sync-partners
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install openpyxl google-api-python-client google-auth

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sync from Drive
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/partners/sync_runner.py --from-drive --commit
